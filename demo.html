<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>노무길잡이 원스탑 · 데모</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f6f9fd;
    color: #2a3142;
    padding-bottom: 70px;
  }
  #root { min-height: 100vh; max-width: 600px; margin: 0 auto; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   디자인 토큰 — 기존 노무길잡이 라이트+골드 테마 계승
============================================================ */
const C = {
  bg0: '#f6f9fd',
  bg1: '#ffffff',
  bg2: '#f0f6ff',
  border: '#dde8f5',
  borderGold: 'rgba(184,146,42,0.25)',
  gold: '#b8922a',
  goldL: '#d4a83c',
  goldD: '#8a6a1a',
  green: '#2d8a5a',
  red: '#c53030',
  blue: '#3b6ec4',
  t1: '#2a3142',
  t2: '#4a5568',
  t3: '#7a8898',
  shadow: '0 2px 8px rgba(30,50,90,0.06)',
  shadowLg: '0 4px 16px rgba(30,50,90,0.1)',
};

const goldGrad = 'linear-gradient(135deg,#d4a83c 0%,#b8922a 60%,#8a6a1a 100%)';
const cardGrad = 'linear-gradient(180deg,#ffffff 0%,#fafcff 100%)';

/* ============================================================
   초기 데모 데이터 (localStorage 비어있을 때만)
============================================================ */
const seedWorkers = [
  {
    id: 'w1', name: '김민수', phone: '010-1234-5678', birth: '1985-03-15',
    type: '정규직', hourly: 12000, sojeongH: 8, joinDate: '2024-03-01',
    contractType: '기간없음', signed: true,
  },
  {
    id: 'w2', name: '이지영', phone: '010-2345-6789', birth: '1992-07-22',
    type: '단시간', hourly: 11000, sojeongH: 5, joinDate: '2025-01-15',
    contractType: '단시간', signed: true,
  },
  {
    id: 'w3', name: '박철호', phone: '010-3456-7890', birth: '1978-11-08',
    type: '일용', hourly: 130000, sojeongH: 8, joinDate: '2026-05-20',
    contractType: '건설일용', signed: true,
  },
];

const todayStr = () => new Date().toISOString().slice(0,10);
const seedAttendance = [
  // 오늘 김민수: 근로자 입력, 사업주 미확인
  { id: 'a1', workerId: 'w1', date: todayStr(), inT: '09:02', outT: '', status: 'pending', source: 'worker' },
  // 오늘 이지영: 확인완료
  { id: 'a2', workerId: 'w2', date: todayStr(), inT: '08:55', outT: '14:00', status: 'approved', source: 'employer' },
];

/* ============================================================
   localStorage 헬퍼
============================================================ */
const LS_KEY = 'nomugil_demo_v1';
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    bizName: '○○카페',
    workers: seedWorkers,
    attendance: seedAttendance,
    industry: 'service',
  };
}
function saveData(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
}

/* ============================================================
   공통 컴포넌트
============================================================ */
function Header({ title, subtitle, onBack }) {
  return (
    <div style={{
      background: 'linear-gradient(180deg,#ffffff 0%,#f4f8fd 100%)',
      borderBottom: '1px solid rgba(184,146,42,0.12)',
      padding: '14px 16px',
      position: 'sticky', top: 0, zIndex: 10,
      boxShadow: '0 2px 12px rgba(30,50,90,0.06)',
      display: 'flex', alignItems: 'center', gap: 10
    }}>
      {onBack && (
        <button onClick={onBack} style={{
          background: 'linear-gradient(135deg,#f0f6ff,#e8f0fa)',
          border: `1.5px solid ${C.border}`,
          color: C.t2, borderRadius: 9, padding: '6px 11px',
          fontSize: 12, fontWeight: 700, cursor: 'pointer',
          fontFamily: 'inherit', flexShrink: 0
        }}>← 뒤로</button>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontWeight: 900, fontSize: 15,
          background: goldGrad,
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
        }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: C.t3, marginTop: 2 }}>{subtitle}</div>}
      </div>
    </div>
  );
}

function Card({ children, style }) {
  return (
    <div style={{
      background: cardGrad,
      border: `1px solid ${C.border}`,
      borderRadius: 12,
      padding: 14,
      boxShadow: C.shadow,
      ...style
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', style, disabled }) {
  const styles = {
    primary: { background: goldGrad, color: '#fff', border: 'none' },
    secondary: {
      background: 'linear-gradient(135deg,#f0f6ff,#e8f0fa)',
      color: C.t2, border: `1.5px solid ${C.border}`
    },
    ghost: { background: 'transparent', color: C.gold, border: `1px solid ${C.borderGold}` },
    danger: { background: '#fff5f5', color: C.red, border: `1px solid #fed7d7` },
  };
  const sizes = {
    sm: { padding: '6px 10px', fontSize: 11, borderRadius: 7 },
    md: { padding: '9px 14px', fontSize: 13, borderRadius: 9 },
    lg: { padding: '12px 18px', fontSize: 14, borderRadius: 10 },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...styles[variant], ...sizes[size],
      fontWeight: 700, cursor: disabled ? 'not-allowed' : 'pointer',
      fontFamily: 'inherit', opacity: disabled ? 0.5 : 1,
      transition: 'all 0.15s',
      boxShadow: variant === 'primary' ? '0 2px 6px rgba(184,146,42,0.25)' : 'none',
      ...style
    }}>{children}</button>
  );
}

function Badge({ children, color = 'gold' }) {
  const colors = {
    gold: { bg: 'rgba(184,146,42,0.1)', fg: C.goldD, br: C.borderGold },
    green: { bg: 'rgba(45,138,90,0.1)', fg: C.green, br: 'rgba(45,138,90,0.25)' },
    red: { bg: '#fff5f5', fg: C.red, br: '#fed7d7' },
    blue: { bg: '#eff6ff', fg: C.blue, br: '#bfdbfe' },
    gray: { bg: '#f5f5f5', fg: C.t3, br: '#e5e5e5' },
  };
  const c = colors[color];
  return (
    <span style={{
      background: c.bg, color: c.fg,
      border: `1px solid ${c.br}`,
      padding: '2px 8px', borderRadius: 6,
      fontSize: 10, fontWeight: 700,
      whiteSpace: 'nowrap'
    }}>{children}</span>
  );
}

/* ============================================================
   하단 탭 네비게이션
============================================================ */
function BottomNav({ tab, setTab }) {
  const tabs = [
    { k: 'home', icon: '🏠', label: '홈' },
    { k: 'workers', icon: '👥', label: '근로자' },
    { k: 'attendance', icon: '🕐', label: '출퇴근' },
    { k: 'payroll', icon: '💰', label: '급여' },
    { k: 'diagnosis', icon: '⚖️', label: '진단' },
  ];
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      background: '#fff',
      borderTop: `1px solid ${C.border}`,
      boxShadow: '0 -2px 12px rgba(30,50,90,0.08)',
      display: 'flex', justifyContent: 'space-around',
      padding: '8px 0 12px', zIndex: 100,
      maxWidth: 600, margin: '0 auto'
    }}>
      {tabs.map(t => (
        <button key={t.k} onClick={() => setTab(t.k)} style={{
          background: 'transparent', border: 'none',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 3, cursor: 'pointer', padding: '4px 8px',
          color: tab === t.k ? C.gold : C.t3,
          fontFamily: 'inherit'
        }}>
          <span style={{ fontSize: 20 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontWeight: tab === t.k ? 800 : 600 }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ============================================================
   홈 탭
============================================================ */
function HomeTab({ data, setTab }) {
  const pendingCount = data.attendance.filter(a => a.status === 'pending').length;
  const activeWorkers = data.workers.length;

  // 이번 달 예상 급여 (간단 추정)
  const monthlyEstimate = data.workers.reduce((sum, w) => {
    if (w.type === '일용') return sum + w.hourly * 20;
    const dailyPay = w.hourly * w.sojeongH;
    return sum + dailyPay * 22; // 월 22일 가정
  }, 0);

  return (
    <div>
      <Header title="노무길잡이 원스탑" subtitle="근로계약 → 출퇴근 → 급여 통합관리" />
      <div style={{ padding: 16 }}>
        {/* 사업장 정보 */}
        <Card style={{ marginBottom: 14, background: goldGrad, color: '#fff', border: 'none' }}>
          <div style={{ fontSize: 11, opacity: 0.85, fontWeight: 600 }}>사업장</div>
          <div style={{ fontSize: 20, fontWeight: 900, marginTop: 2 }}>{data.bizName}</div>
          <div style={{ fontSize: 11, opacity: 0.85, marginTop: 4 }}>
            {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
          </div>
        </Card>

        {/* 요약 통계 */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
          <Card style={{ padding: 12 }}>
            <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>재직 근로자</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: C.t1, marginTop: 4 }}>
              {activeWorkers}<span style={{ fontSize: 12, color: C.t3, marginLeft: 2 }}>명</span>
            </div>
          </Card>
          <Card style={{ padding: 12, borderColor: pendingCount > 0 ? '#fed7d7' : C.border }}>
            <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>미확인 출퇴근</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: pendingCount > 0 ? C.red : C.t1, marginTop: 4 }}>
              {pendingCount}<span style={{ fontSize: 12, color: C.t3, marginLeft: 2 }}>건</span>
            </div>
          </Card>
        </div>

        <Card style={{ marginBottom: 14, padding: 12 }}>
          <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>이번 달 예상 급여 (총액)</div>
          <div style={{ fontSize: 22, fontWeight: 900, color: C.goldD, marginTop: 4 }}>
            {monthlyEstimate.toLocaleString()}<span style={{ fontSize: 12, marginLeft: 2 }}>원</span>
          </div>
        </Card>

        {/* 빠른 실행 */}
        <div style={{ fontSize: 12, fontWeight: 800, color: C.t2, marginBottom: 8, padding: '0 2px' }}>
          ⚡ 빠른 실행
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
          <Btn variant="secondary" size="lg" onClick={() => setTab('workers')} style={{ justifyContent: 'flex-start' }}>
            👤 근로자 추가
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('attendance')}>
            🕐 출퇴근 입력
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('payroll')}>
            💰 급여 계산
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('diagnosis')}>
            ⚖️ 의무 진단
          </Btn>
        </div>

        {/* 알림 */}
        {pendingCount > 0 && (
          <Card style={{ background: '#fff5f5', borderColor: '#fed7d7' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18 }}>🔔</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.red }}>
                  미승인 출퇴근 기록 {pendingCount}건
                </div>
                <div style={{ fontSize: 10, color: C.t3, marginTop: 2 }}>
                  근로자가 입력한 기록을 확인해주세요
                </div>
              </div>
              <Btn size="sm" onClick={() => setTab('attendance')}>확인</Btn>
            </div>
          </Card>
        )}

        {/* 데모 안내 */}
        <Card style={{ marginTop: 14, background: '#eff6ff', borderColor: '#bfdbfe' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.blue, marginBottom: 4 }}>
            ℹ️ 데모 버전 안내
          </div>
          <div style={{ fontSize: 11, color: C.t2, lineHeight: 1.6 }}>
            이 데모는 GitHub Pages용 단일 HTML로 제작되었습니다.<br/>
            데이터는 기기 내(localStorage)에만 저장됩니다.<br/>
            샘플 근로자 3명과 오늘 출퇴근 기록이 미리 들어있습니다.
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   근로자 탭
============================================================ */
function WorkersTab({ data, setData }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);

  if (showAdd || editing) {
    return <WorkerForm
      worker={editing}
      onSave={(w) => {
        if (editing) {
          setData({ ...data, workers: data.workers.map(x => x.id === w.id ? w : x) });
        } else {
          setData({ ...data, workers: [...data.workers, { ...w, id: 'w' + Date.now() }] });
        }
        setShowAdd(false);
        setEditing(null);
      }}
      onCancel={() => { setShowAdd(false); setEditing(null); }}
    />;
  }

  return (
    <div>
      <Header title="근로자 관리" subtitle={`재직 ${data.workers.length}명`} />
      <div style={{ padding: 16 }}>
        <Btn onClick={() => setShowAdd(true)} style={{ width: '100%', marginBottom: 14 }} size="lg">
          + 근로자 등록 (계약서 작성)
        </Btn>

        {data.workers.length === 0 ? (
          <Card style={{ textAlign: 'center', padding: 32, color: C.t3 }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>👥</div>
            <div style={{ fontSize: 13 }}>등록된 근로자가 없습니다</div>
          </Card>
        ) : (
          data.workers.map(w => (
            <Card key={w.id} style={{ marginBottom: 10 }} onClick={() => setEditing(w)}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer' }}
                   onClick={() => setEditing(w)}>
                <div style={{
                  width: 42, height: 42, borderRadius: 21,
                  background: 'linear-gradient(145deg,#f0e8d0,#e8d9a0)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 18, flexShrink: 0
                }}>👤</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <span style={{ fontWeight: 800, fontSize: 14, color: C.t1 }}>{w.name}</span>
                    <Badge color="gold">{w.type}</Badge>
                    {w.signed && <Badge color="green">✓ 계약서</Badge>}
                  </div>
                  <div style={{ fontSize: 11, color: C.t3, lineHeight: 1.6 }}>
                    시급 {w.hourly.toLocaleString()}원 · 소정 {w.sojeongH}h<br/>
                    입사 {w.joinDate} · {w.phone}
                  </div>
                </div>
                <div style={{ color: C.t3, fontSize: 18 }}>›</div>
              </div>
            </Card>
          ))
        )}
      </div>
    </div>
  );
}

function WorkerForm({ worker, onSave, onCancel }) {
  const [form, setForm] = useState(worker || {
    name: '', phone: '', birth: '',
    type: '정규직', hourly: 10320, sojeongH: 8,
    joinDate: todayStr(), contractType: '기간없음', signed: false,
  });
  const [step, setStep] = useState(1);

  const update = (k, v) => setForm({ ...form, [k]: v });

  return (
    <div>
      <Header title={worker ? '근로자 정보' : '근로자 등록'}
              subtitle={`${step}/2 단계`}
              onBack={onCancel} />
      <div style={{ padding: 16 }}>
        {step === 1 && (
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: C.t1, marginBottom: 12 }}>1️⃣ 기본 정보</div>
            <Field label="이름" value={form.name} onChange={v => update('name', v)} />
            <Field label="연락처" value={form.phone} onChange={v => update('phone', v)} placeholder="010-0000-0000" />
            <Field label="생년월일" type="date" value={form.birth} onChange={v => update('birth', v)} />
            <Field label="입사일" type="date" value={form.joinDate} onChange={v => update('joinDate', v)} />

            <div style={{ marginTop: 10, marginBottom: 6, fontSize: 12, fontWeight: 700, color: C.t2 }}>고용형태</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 6 }}>
              {['정규직', '단시간', '일용'].map(t => (
                <button key={t} onClick={() => update('type', t)} style={{
                  padding: '8px', fontSize: 12, fontWeight: 700,
                  borderRadius: 8, cursor: 'pointer', fontFamily: 'inherit',
                  background: form.type === t ? goldGrad : '#fff',
                  color: form.type === t ? '#fff' : C.t2,
                  border: `1.5px solid ${form.type === t ? C.gold : C.border}`
                }}>{t}</button>
              ))}
            </div>

            <Btn onClick={() => setStep(2)} style={{ width: '100%', marginTop: 16 }} size="lg"
                 disabled={!form.name || !form.phone}>
              다음: 계약 조건 →
            </Btn>
          </Card>
        )}

        {step === 2 && (
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: C.t1, marginBottom: 12 }}>2️⃣ 근로계약 조건</div>

            <Field label="시급 (원)" type="number" value={form.hourly}
                   onChange={v => update('hourly', Number(v))} />
            <div style={{ fontSize: 10, color: C.t3, marginTop: -8, marginBottom: 10 }}>
              ※ 2026년 최저시급: 10,320원
            </div>

            <Field label="1일 소정근로시간 (h)" type="number" value={form.sojeongH}
                   onChange={v => update('sojeongH', Number(v))} />

            <div style={{ marginTop: 10, marginBottom: 6, fontSize: 12, fontWeight: 700, color: C.t2 }}>계약서 유형</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {['기간없음', '기간있음', '단시간', '건설일용'].map(t => (
                <button key={t} onClick={() => update('contractType', t)} style={{
                  padding: '8px', fontSize: 11, fontWeight: 700,
                  borderRadius: 8, cursor: 'pointer', fontFamily: 'inherit',
                  background: form.contractType === t ? goldGrad : '#fff',
                  color: form.contractType === t ? '#fff' : C.t2,
                  border: `1.5px solid ${form.contractType === t ? C.gold : C.border}`
                }}>{t}</button>
              ))}
            </div>

            <div style={{ marginTop: 14, padding: 10, background: '#fffbeb',
                          border: '1px solid #fde68a', borderRadius: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.goldD, marginBottom: 4 }}>
                📄 계약서 작성 (실제 앱에서)
              </div>
              <div style={{ fontSize: 11, color: C.t2, lineHeight: 1.6 }}>
                실제 버전에서는 여기서 표준근로계약서 4종 중 자동 선택되어 작성됩니다.
                작성 완료 후 PDF 출력하여 서면으로 양쪽 보관 가능합니다.
              </div>
            </div>

            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <Btn variant="secondary" onClick={() => setStep(1)} style={{ flex: 1 }}>← 이전</Btn>
              <Btn onClick={() => onSave({ ...form, signed: true })} style={{ flex: 2 }} size="md">
                ✓ 저장 (계약완료)
              </Btn>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type = 'text', placeholder }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.t2, marginBottom: 4 }}>{label}</div>
      <input
        type={type} value={value} onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width: '100%', padding: '10px 12px',
          fontSize: 13, color: C.t1,
          border: `1.5px solid ${C.border}`, borderRadius: 8,
          background: '#fff', fontFamily: 'inherit', outline: 'none'
        }}
        onFocus={e => e.target.style.borderColor = C.gold}
        onBlur={e => e.target.style.borderColor = C.border}
      />
    </div>
  );
}

/* ============================================================
   출퇴근 탭
============================================================ */
function AttendanceTab({ data, setData }) {
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [showAdd, setShowAdd] = useState(false);
  const [showSimulate, setShowSimulate] = useState(false);

  const dayRecords = data.attendance.filter(a => a.date === selectedDate);

  const getWorker = (id) => data.workers.find(w => w.id === id);

  const approve = (recId) => {
    setData({
      ...data,
      attendance: data.attendance.map(a => a.id === recId ? { ...a, status: 'approved' } : a)
    });
  };

  const reject = (recId) => {
    if (!confirm('이 기록을 삭제하시겠습니까?')) return;
    setData({ ...data, attendance: data.attendance.filter(a => a.id !== recId) });
  };

  // 근로자 입력 시뮬레이션
  const simulateWorkerInput = (workerId, inT, outT) => {
    const newRec = {
      id: 'a' + Date.now(),
      workerId, date: selectedDate,
      inT, outT,
      status: 'pending', source: 'worker'
    };
    setData({ ...data, attendance: [...data.attendance, newRec] });
    setShowSimulate(false);
  };

  if (showAdd) {
    return <AttendanceForm
      data={data} selectedDate={selectedDate}
      onSave={(rec) => {
        setData({ ...data, attendance: [...data.attendance, { ...rec, id: 'a' + Date.now() }] });
        setShowAdd(false);
      }}
      onCancel={() => setShowAdd(false)}
    />;
  }

  if (showSimulate) {
    return <SimulateWorkerInput
      data={data} selectedDate={selectedDate}
      onSubmit={simulateWorkerInput}
      onCancel={() => setShowSimulate(false)}
    />;
  }

  return (
    <div>
      <Header title="출퇴근 관리" subtitle="근로자 입력 → 사업주 확인" />
      <div style={{ padding: 16 }}>
        <Card style={{ marginBottom: 14, padding: 10 }}>
          <input type="date" value={selectedDate}
                 onChange={e => setSelectedDate(e.target.value)}
                 style={{
                   width: '100%', padding: '8px',
                   fontSize: 13, fontWeight: 700, color: C.t1,
                   border: `1.5px solid ${C.border}`, borderRadius: 7,
                   fontFamily: 'inherit', outline: 'none', textAlign: 'center'
                 }} />
        </Card>

        <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
          <Btn onClick={() => setShowAdd(true)} style={{ flex: 1 }}>
            ＋ 사업주 입력
          </Btn>
          <Btn variant="ghost" onClick={() => setShowSimulate(true)} style={{ flex: 1 }}>
            📱 근로자 입력 시뮬
          </Btn>
        </div>

        {dayRecords.length === 0 ? (
          <Card style={{ textAlign: 'center', padding: 32, color: C.t3 }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>🕐</div>
            <div style={{ fontSize: 13 }}>이 날짜에 기록이 없습니다</div>
          </Card>
        ) : (
          dayRecords.map(rec => {
            const w = getWorker(rec.workerId);
            if (!w) return null;
            const isPending = rec.status === 'pending';
            return (
              <Card key={rec.id} style={{
                marginBottom: 10,
                borderColor: isPending ? '#fed7d7' : C.border,
                background: isPending ? '#fffafa' : cardGrad
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                  <span style={{ fontWeight: 800, fontSize: 14, color: C.t1 }}>{w.name}</span>
                  {rec.source === 'worker' && <Badge color="blue">근로자 입력</Badge>}
                  {isPending ? <Badge color="red">⏳ 미확인</Badge> : <Badge color="green">✓ 확인완료</Badge>}
                </div>
                <div style={{ display: 'flex', gap: 16, fontSize: 12, color: C.t2, marginBottom: 10 }}>
                  <div>출근 <strong style={{ color: C.t1 }}>{rec.inT || '-'}</strong></div>
                  <div>퇴근 <strong style={{ color: C.t1 }}>{rec.outT || '-'}</strong></div>
                </div>
                {isPending && (
                  <div style={{ display: 'flex', gap: 6 }}>
                    <Btn size="sm" onClick={() => approve(rec.id)} style={{ flex: 1 }}>
                      ✓ 승인
                    </Btn>
                    <Btn size="sm" variant="danger" onClick={() => reject(rec.id)}>
                      삭제
                    </Btn>
                  </div>
                )}
              </Card>
            );
          })
        )}
      </div>
    </div>
  );
}

  const [outT, setOutT] = useState('18:00');

  return (
    <div>

        <Card>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.t2, marginBottom: 4 }}>근로자 선택</div>
          <select value={workerId} onChange={e => setWorkerId(e.target.value)} style={{
            width: '100%', padding: '10px', fontSize: 13,
            border: `1.5px solid ${C.border}`, borderRadius: 8,
            marginBottom: 12, fontFamily: 'inherit', background: '#fff'
          }}>
            {data.workers.map(w => <option key={w.id} value={w.id}>{w.name} ({w.type})</option>)}

          <Field label="출근 시각" type="time" value={inT} onChange={setInT} />
          <Field label="퇴근 시각" type="time" value={outT} onChange={setOutT} />

          <Btn onClick={() => onSave({
            workerId, date: selectedDate, inT, outT,
            status: 'approved', source: 'employer'
          })} style={{ width: '100%', marginTop: 8 }} size="lg">
            ✓ 즉시 승인 저장
          </Btn>
        </Card>
      </div>
    </div>
  );
}

      <div style={{ padding: 16 }}>
        <Card style={{ background: '#eff6ff', borderColor: '#bfdbfe', marginBottom: 12 }}>

            여기서는 데모를 위해 사업주 화면에서 시뮬레이션합니다.<br/>

          <Field label="내 퇴근 시각" type="time" value={outT} onChange={setOutT} />

          <Btn onClick={() => onSubmit(workerId, inT, outT)}

            📤 사업주에게 제출
          </Btn>
        </Card>
      </div>

  );
}

/* ============================================================
   급여 탭
============================================================ */
function PayrollTab({ data }) {
  const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
  const [selectedWorker, setSelectedWorker] = useState(null);

  // 월별 집계
  const calcWorkerPay = (worker) => {
    const recs = data.attendance.filter(a =>
      a.workerId === worker.id &&
      a.date.startsWith(selectedMonth) &&
      a.status === 'approved' &&
      a.outT
    );

    let totalH = 0, sojeongTotal = 0, overtimeTotal = 0;
    recs.forEach(r => {
      const [inH, inM] = r.inT.split(':').map(Number);
      const [outH, outM] = r.outT.split(':').map(Number);
      const hours = (outH + outM/60) - (inH + inM/60);
      if (hours <= 0) return;
      totalH += hours;
      const sj = Math.min(hours, worker.sojeongH);
      sojeongTotal += sj;
      overtimeTotal += Math.max(0, hours - worker.sojeongH);
    });

    const basePay = sojeongTotal * worker.hourly;
    const overtimePay = overtimeTotal * worker.hourly * 1.5;

    // 주휴수당 (간단 계산: 주 소정 15시간 이상이면 1주당 주휴 발생)
    const weeks = Math.floor(recs.length / 5); // 단순화
    const weeklyHoliday = weeks * Math.min((worker.sojeongH * 5 / 40) * 8, 8) * worker.hourly;

    const total = basePay + overtimePay + weeklyHoliday;

    return {
      days: recs.length,
      totalH: totalH.toFixed(1),
      sojeongTotal: sojeongTotal.toFixed(1),
      overtimeTotal: overtimeTotal.toFixed(1),
      basePay: Math.round(basePay),
      overtimePay: Math.round(overtimePay),
      weeklyHoliday: Math.round(weeklyHoliday),
      total: Math.round(total),
    };
  };

  if (selectedWorker) {
    const pay = calcWorkerPay(selectedWorker);
    return (
      <div>
        <Header title={`${selectedWorker.name} 급여명세서`}
                subtitle={`${selectedMonth}`}
                onBack={() => setSelectedWorker(null)} />
        <div style={{ padding: 16 }}>
          <Card style={{ background: goldGrad, color: '#fff', border: 'none', marginBottom: 14 }}>
            <div style={{ fontSize: 11, opacity: 0.85 }}>지급 총액</div>
            <div style={{ fontSize: 28, fontWeight: 900, marginTop: 4 }}>
              {pay.total.toLocaleString()}<span style={{ fontSize: 14 }}>원</span>
            </div>
            <div style={{ fontSize: 10, opacity: 0.85, marginTop: 4 }}>
              근무 {pay.days}일 · 총 {pay.totalH}시간
            </div>
          </Card>

          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 10 }}>📋 산정 내역</div>
            <PayRow label="기본급" detail={`${pay.sojeongTotal}h × ${selectedWorker.hourly.toLocaleString()}원`} value={pay.basePay} />
            <PayRow label="연장수당" detail={`${pay.overtimeTotal}h × ${selectedWorker.hourly.toLocaleString()}원 × 1.5`} value={pay.overtimePay} />
            <PayRow label="주휴수당" detail="주 소정 15h 이상 개근" value={pay.weeklyHoliday} />
            <div style={{ borderTop: `2px solid ${C.gold}`, marginTop: 10, paddingTop: 10,
                          display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontWeight: 800 }}>합계</span>
              <span style={{ fontWeight: 900, color: C.goldD, fontSize: 16 }}>
                {pay.total.toLocaleString()}원
              </span>
            </div>
          </Card>

          {/* 최저임금 체크 */}
          {(() => {
            const effHourly = (pay.totalH > 0) ? pay.total / parseFloat(pay.totalH) : 0;
            const minOK = effHourly >= 10320;
            return (
              <Card style={{
                background: minOK ? '#f0fdf4' : '#fff5f5',
                borderColor: minOK ? '#bbf7d0' : '#fed7d7',
                marginBottom: 14
              }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: minOK ? C.green : C.red }}>
                  {minOK ? '✓ 최저임금 충족' : '⚠️ 최저임금 미달 가능성'}
                </div>
                <div style={{ fontSize: 11, color: C.t2, marginTop: 4, lineHeight: 1.6 }}>
                  실질시급: {Math.round(effHourly).toLocaleString()}원 / 2026년 최저시급 10,320원
                </div>
              </Card>
            );
          })()}

          <Btn style={{ width: '100%' }} size="lg" onClick={() => alert('실제 앱에서는 PDF 명세서가 출력됩니다')}>
            📄 급여명세서 PDF 출력
          </Btn>
        </div>
      </div>
    );
  }

  return (
    <div>
      <Header title="급여 계산" subtitle="출퇴근 기록 자동 집계" />
      <div style={{ padding: 16 }}>
        <Card style={{ marginBottom: 14, padding: 10 }}>
          <input type="month" value={selectedMonth}
                 onChange={e => setSelectedMonth(e.target.value)}
                 style={{
                   width: '100%', padding: '8px',
                   fontSize: 13, fontWeight: 700, color: C.t1,
                   border: `1.5px solid ${C.border}`, borderRadius: 7,
                   fontFamily: 'inherit', outline: 'none', textAlign: 'center'
                 }} />
        </Card>

        {data.workers.map(w => {
          const pay = calcWorkerPay(w);
          return (
            <Card key={w.id} style={{ marginBottom: 10, cursor: 'pointer' }}
                  onClick={() => setSelectedWorker(w)}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <span style={{ fontWeight: 800, fontSize: 14, color: C.t1 }}>{w.name}</span>
                    <Badge color="gold">{w.type}</Badge>
                  </div>
                  <div style={{ fontSize: 11, color: C.t3, marginBottom: 6 }}>
                    근무 {pay.days}일 · 소정 {pay.sojeongTotal}h · 연장 {pay.overtimeTotal}h
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 900, color: C.goldD }}>
                    {pay.total.toLocaleString()}원
                  </div>
                </div>
                <div style={{ color: C.t3, fontSize: 18 }}>›</div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function PayRow({ label, detail, value }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between',
                  alignItems: 'flex-start', padding: '6px 0' }}>
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.t1 }}>{label}</div>
        <div style={{ fontSize: 10, color: C.t3, marginTop: 2 }}>{detail}</div>
      </div>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.t1 }}>
        {value.toLocaleString()}원
      </div>
    </div>
  );
}

/* ============================================================
   진단 탭 (간소화)
============================================================ */
function DiagnosisTab({ data }) {
  const n = data.workers.length;
  const items = [
    { t: '근로계약서 서면 작성·교부', s: 'all', heavy: true, b: '근기법 §17' },
    { t: '임금명세서 교부', s: 'all', b: '근기법 §48' },
    { t: '최저임금 준수', s: 'all', heavy: true, b: '최저임금법' },
    { t: '주휴수당 (주 15h↑)', s: 'all', b: '근기법 §55' },
    { t: '연차유급휴가', s: 'n5', b: '근기법 §60' },
    { t: '연장·야간·휴일 가산수당', s: 'n5', b: '근기법 §56' },
    { t: '해고 서면통지', s: 'n5', b: '근기법 §27' },
    { t: '취업규칙 작성·신고', s: 'n10', b: '근기법 §93' },
    { t: '직장내괴롭힘 조치의무', s: 'n5', b: '근기법 §76의2' },
    { t: '4대보험 가입', s: 'all', b: '각 보험법' },
    { t: '산업안전보건교육', s: 'n5', b: '산안법' },
    { t: '중대재해처벌법', s: 'n5', heavy: true, b: '중처법' },
  ];

  const check = (s) => {
    if (s === 'all') return true;
    if (s === 'n5') return n >= 5;
    if (s === 'n10') return n >= 10;
    return false;
  };

  const applied = items.filter(i => check(i.s));

  return (
    <div>
      <Header title="의무사항 진단" subtitle={`현재 인원 ${n}명 기준`} />
      <div style={{ padding: 16 }}>
        <Card style={{ background: goldGrad, color: '#fff', border: 'none', marginBottom: 14 }}>
          <div style={{ fontSize: 11, opacity: 0.85 }}>적용 의무 항목</div>
          <div style={{ fontSize: 24, fontWeight: 900, marginTop: 4 }}>
            {applied.length}<span style={{ fontSize: 12 }}> / {items.length}개</span>
          </div>
          <div style={{ fontSize: 10, opacity: 0.85, marginTop: 4 }}>
            근로자 수에 따라 자동 판정됩니다
          </div>
        </Card>

        {items.map((item, i) => {
          const ok = check(item.s);
          return (
            <Card key={i} style={{
              marginBottom: 8, padding: 12,
              opacity: ok ? 1 : 0.5,
              borderColor: ok ? (item.heavy ? '#fed7d7' : C.borderGold) : C.border
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 16 }}>{ok ? '✅' : '⚪'}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontWeight: 700, fontSize: 13, color: C.t1 }}>{item.t}</span>
                    {item.heavy && <Badge color="red">중대</Badge>}
                  </div>
                  <div style={{ fontSize: 10, color: C.t3, marginTop: 2 }}>
                    {item.b} · {item.s === 'all' ? '1인 이상' : item.s === 'n5' ? '5인 이상' : '10인 이상'}
                  </div>
                </div>
              </div>
            </Card>
          );
        })}

        <Card style={{ marginTop: 14, background: '#eff6ff', borderColor: '#bfdbfe' }}>
          <div style={{ fontSize: 11, color: C.blue, lineHeight: 1.6 }}>
            ℹ️ 실제 앱의 의무진단은 62개 항목, 10개 카테고리, 업종별 세부 판정을 제공합니다.
            여기서는 12개 핵심 항목만 데모로 표시합니다.
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   메인 앱
============================================================ */
function App() {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('home');

  useEffect(() => { saveData(data); }, [data]);

  return (
    <div>
      {tab === 'home' && <HomeTab data={data} setTab={setTab} />}
      {tab === 'workers' && <WorkersTab data={data} setData={setData} />}
      {tab === 'attendance' && <AttendanceTab data={data} setData={setData} />}
      {tab === 'payroll' && <PayrollTab data={data} />}
      {tab === 'diagnosis' && <DiagnosisTab data={data} />}
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
