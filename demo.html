<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>노무길잡이 원스탑 · 데모</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f6f9fd;
    color: #2a3142;
    padding-bottom: 70px;
  }
  #root { min-height: 100vh; max-width: 600px; margin: 0 auto; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   디자인 토큰 — 기존 노무길잡이 라이트+골드 테마 계승
============================================================ */
const C = {
  bg0: '#f6f9fd',
  bg1: '#ffffff',
  bg2: '#f0f6ff',
  border: '#dde8f5',
  borderGold: 'rgba(184,146,42,0.25)',
  gold: '#b8922a',
  goldL: '#d4a83c',
  goldD: '#8a6a1a',
  green: '#2d8a5a',
  red: '#c53030',
  blue: '#3b6ec4',
  t1: '#2a3142',
  t2: '#4a5568',
  t3: '#7a8898',
  shadow: '0 2px 8px rgba(30,50,90,0.06)',
  shadowLg: '0 4px 16px rgba(30,50,90,0.1)',
};

const goldGrad = 'linear-gradient(135deg,#d4a83c 0%,#b8922a 60%,#8a6a1a 100%)';
const cardGrad = 'linear-gradient(180deg,#ffffff 0%,#fafcff 100%)';

/* ============================================================
   초기 데모 데이터 (localStorage 비어있을 때만)
============================================================ */
const seedWorkers = [
  {
    id: 'w1', name: '김민수', phone: '010-1234-5678', birth: '1985-03-15',
    type: '정규직', hourly: 12000, sojeongH: 8, joinDate: '2024-03-01',
    contractType: '기간없음', signed: true,
  },
  {
    id: 'w2', name: '이지영', phone: '010-2345-6789', birth: '1992-07-22',
    type: '단시간', hourly: 11000, sojeongH: 5, joinDate: '2025-01-15',
    contractType: '단시간', signed: true,
  },
  {
    id: 'w3', name: '박철호', phone: '010-3456-7890', birth: '1978-11-08',
    type: '일용', hourly: 130000, sojeongH: 8, joinDate: '2026-05-20',
    contractType: '건설일용', signed: true,
  },
];

const todayStr = () => new Date().toISOString().slice(0,10);
const seedAttendance = [
  // 오늘 김민수: 근로자 입력, 사업주 미확인
  { id: 'a1', workerId: 'w1', date: todayStr(), inT: '09:02', outT: '', status: 'pending', source: 'worker' },
  // 오늘 이지영: 확인완료
  { id: 'a2', workerId: 'w2', date: todayStr(), inT: '08:55', outT: '14:00', status: 'approved', source: 'employer' },
];

/* ============================================================
   localStorage 헬퍼
============================================================ */
const LS_KEY = 'nomugil_demo_v2';
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    mode: null,           // null | 'employer' | 'personal'
    bizName: '○○카페',
    workers: seedWorkers,
    attendance: seedAttendance,
    industry: 'service',
    // 개인 기록 모드 데이터
    personal: {
      name: '',
      workplace: '',
      hourly: 10320,
      sojeongH: 8,
      records: [],        // [{id, date, inT, outT, breakH}]
      actualReceived: [], // [{id, month, amount}]
    },
  };
}
function saveData(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
}

/* ============================================================
   공통 컴포넌트
============================================================ */
function Header({ title, subtitle, onBack }) {
  return (
    <div style={{
      background: 'linear-gradient(180deg,#ffffff 0%,#f4f8fd 100%)',
      borderBottom: '1px solid rgba(184,146,42,0.12)',
      padding: '14px 16px',
      position: 'sticky', top: 0, zIndex: 10,
      boxShadow: '0 2px 12px rgba(30,50,90,0.06)',
      display: 'flex', alignItems: 'center', gap: 10
    }}>
      {onBack && (
        <button onClick={onBack} style={{
          background: 'linear-gradient(135deg,#f0f6ff,#e8f0fa)',
          border: `1.5px solid ${C.border}`,
          color: C.t2, borderRadius: 9, padding: '6px 11px',
          fontSize: 12, fontWeight: 700, cursor: 'pointer',
          fontFamily: 'inherit', flexShrink: 0
        }}>← 뒤로</button>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontWeight: 900, fontSize: 15,
          background: goldGrad,
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
        }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: C.t3, marginTop: 2 }}>{subtitle}</div>}
      </div>
    </div>
  );
}

function Card({ children, style }) {
  return (
    <div style={{
      background: cardGrad,
      border: `1px solid ${C.border}`,
      borderRadius: 12,
      padding: 14,
      boxShadow: C.shadow,
      ...style
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', style, disabled }) {
  const styles = {
    primary: { background: goldGrad, color: '#fff', border: 'none' },
    secondary: {
      background: 'linear-gradient(135deg,#f0f6ff,#e8f0fa)',
      color: C.t2, border: `1.5px solid ${C.border}`
    },
    ghost: { background: 'transparent', color: C.gold, border: `1px solid ${C.borderGold}` },
    danger: { background: '#fff5f5', color: C.red, border: `1px solid #fed7d7` },
  };
  const sizes = {
    sm: { padding: '6px 10px', fontSize: 11, borderRadius: 7 },
    md: { padding: '9px 14px', fontSize: 13, borderRadius: 9 },
    lg: { padding: '12px 18px', fontSize: 14, borderRadius: 10 },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...styles[variant], ...sizes[size],
      fontWeight: 700, cursor: disabled ? 'not-allowed' : 'pointer',
      fontFamily: 'inherit', opacity: disabled ? 0.5 : 1,
      transition: 'all 0.15s',
      boxShadow: variant === 'primary' ? '0 2px 6px rgba(184,146,42,0.25)' : 'none',
      ...style
    }}>{children}</button>
  );
}

function Badge({ children, color = 'gold' }) {
  const colors = {
    gold: { bg: 'rgba(184,146,42,0.1)', fg: C.goldD, br: C.borderGold },
    green: { bg: 'rgba(45,138,90,0.1)', fg: C.green, br: 'rgba(45,138,90,0.25)' },
    red: { bg: '#fff5f5', fg: C.red, br: '#fed7d7' },
    blue: { bg: '#eff6ff', fg: C.blue, br: '#bfdbfe' },
    gray: { bg: '#f5f5f5', fg: C.t3, br: '#e5e5e5' },
  };
  const c = colors[color];
  return (
    <span style={{
      background: c.bg, color: c.fg,
      border: `1px solid ${c.br}`,
      padding: '2px 8px', borderRadius: 6,
      fontSize: 10, fontWeight: 700,
      whiteSpace: 'nowrap'
    }}>{children}</span>
  );
}

/* ============================================================
   하단 탭 네비게이션
============================================================ */
function BottomNav({ tab, setTab }) {
  const tabs = [
    { k: 'home', icon: '🏠', label: '홈' },
    { k: 'workers', icon: '👥', label: '근로자' },
    { k: 'attendance', icon: '🕐', label: '출퇴근' },
    { k: 'payroll', icon: '💰', label: '급여' },
    { k: 'diagnosis', icon: '⚖️', label: '진단' },
  ];
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      background: '#fff',
      borderTop: `1px solid ${C.border}`,
      boxShadow: '0 -2px 12px rgba(30,50,90,0.08)',
      display: 'flex', justifyContent: 'space-around',
      padding: '8px 0 12px', zIndex: 100,
      maxWidth: 600, margin: '0 auto'
    }}>
      {tabs.map(t => (
        <button key={t.k} onClick={() => setTab(t.k)} style={{
          background: 'transparent', border: 'none',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 3, cursor: 'pointer', padding: '4px 8px',
          color: tab === t.k ? C.gold : C.t3,
          fontFamily: 'inherit'
        }}>
          <span style={{ fontSize: 20 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontWeight: tab === t.k ? 800 : 600 }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ============================================================
   홈 탭
============================================================ */
function HomeTab({ data, setTab, setData }) {
  const pendingCount = data.attendance.filter(a => a.status === 'pending').length;
  const activeWorkers = data.workers.length;
  const thisMonth = new Date().toISOString().slice(0, 7);

  // 이번 달 예상 급여
  const monthlyEstimate = data.workers.reduce((sum, w) => {
    if (w.type === '일용') return sum + w.hourly * 20;
    return sum + w.hourly * w.sojeongH * 22;
  }, 0);

  // 이번 달 처리된 출퇴근 건수
  const thisMonthApproved = data.attendance.filter(
    a => a.date.startsWith(thisMonth) && a.status === 'approved'
  ).length;

  // 절약 시간 계산 (건당 처리 기준)
  // 출퇴근 처리: 건당 5분 절약 / 급여계산: 근로자당 40분 절약 / 명세서: 근로자당 15분
  const savedAttendMin = thisMonthApproved * 5;
  const savedPayrollMin = activeWorkers * 40;
  const savedSlipMin = activeWorkers * 15;
  const totalSavedMin = savedAttendMin + savedPayrollMin + savedSlipMin;
  const totalSavedH = (totalSavedMin / 60).toFixed(1);
  // 최저임금 기준 환산
  const savedMoney = Math.round((totalSavedMin / 60) * 10320);

  return (
    <div>
      <Header title="노무길잡이 원스탑" subtitle="근로계약 → 출퇴근 → 급여 통합관리" />
      <div style={{ padding: 16 }}>

        {/* 사업장 카드 */}
        <Card style={{ marginBottom: 14, background: goldGrad, color: '#fff', border: 'none' }}>
          <div style={{ fontSize: 11, opacity: 0.85, fontWeight: 600 }}>사업장</div>
          <div style={{ fontSize: 20, fontWeight: 900, marginTop: 2 }}>{data.bizName}</div>
          <div style={{ fontSize: 11, opacity: 0.85, marginTop: 4 }}>
            {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
          </div>
        </Card>

        {/* 요약 통계 2x2 */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
          <Card style={{ padding: 12 }}>
            <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>재직 근로자</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: C.t1, marginTop: 4 }}>
              {activeWorkers}<span style={{ fontSize: 12, color: C.t3, marginLeft: 2 }}>명</span>
            </div>
          </Card>
          <Card style={{ padding: 12, borderColor: pendingCount > 0 ? '#fed7d7' : C.border }}>
            <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>미확인 출퇴근</div>
            <div style={{ fontSize: 22, fontWeight: 900,
                          color: pendingCount > 0 ? C.red : C.t1, marginTop: 4 }}>
              {pendingCount}<span style={{ fontSize: 12, color: C.t3, marginLeft: 2 }}>건</span>
            </div>
          </Card>
        </div>

        <Card style={{ marginBottom: 14, padding: 12 }}>
          <div style={{ fontSize: 10, color: C.t3, fontWeight: 600 }}>이번 달 예상 급여 (총액)</div>
          <div style={{ fontSize: 22, fontWeight: 900, color: C.goldD, marginTop: 4 }}>
            {monthlyEstimate.toLocaleString()}<span style={{ fontSize: 12, marginLeft: 2 }}>원</span>
          </div>
        </Card>

        {/* ★ 효율성 카드 ★ */}
        <Card style={{
          marginBottom: 14,
          background: 'linear-gradient(135deg,#f0fdf4,#dcfce7)',
          borderColor: '#bbf7d0'
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10 }}>
            <span style={{ fontSize: 16 }}>⏱️</span>
            <div style={{ fontWeight: 800, fontSize: 13, color: C.green }}>
              이달 절약한 시간
            </div>
            <div style={{ marginLeft: 'auto', fontSize: 11, color: C.green, fontWeight: 700 }}>
              {totalSavedH}시간
            </div>
          </div>

          <EfficRow icon="✅" label="출퇴근 처리" detail={`${thisMonthApproved}건 × 5분`}
                    min={savedAttendMin} />
          <EfficRow icon="💰" label="급여 계산" detail={`근로자 ${activeWorkers}명 × 40분`}
                    min={savedPayrollMin} />
          <EfficRow icon="📄" label="명세서 발급" detail={`근로자 ${activeWorkers}명 × 15분`}
                    min={savedSlipMin} />

          <div style={{
            marginTop: 10, paddingTop: 10,
            borderTop: '1px solid rgba(45,138,90,0.15)',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center'
          }}>
            <div style={{ fontSize: 11, color: C.green }}>
              최저시급 기준 환산
            </div>
            <div style={{ fontSize: 14, fontWeight: 900, color: C.green }}>
              {savedMoney.toLocaleString()}원 상당
            </div>
          </div>

          <div style={{ fontSize: 10, color: '#2d8a5a', opacity: 0.7, marginTop: 6, lineHeight: 1.6 }}>
            * 수동 처리 대비 절약 추정치 (출퇴근 건당 5분, 급여계산 인당 40분, 명세서 인당 15분 기준)
          </div>
        </Card>

        {/* 빠른 실행 */}
        <div style={{ fontSize: 12, fontWeight: 800, color: C.t2, marginBottom: 8, padding: '0 2px' }}>
          ⚡ 빠른 실행
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
          <Btn variant="secondary" size="lg" onClick={() => setTab('workers')}>
            👤 근로자 추가
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('attendance')}>
            🕐 출퇴근 입력
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('payroll')}>
            💰 급여 계산
          </Btn>
          <Btn variant="secondary" size="lg" onClick={() => setTab('diagnosis')}>
            ⚖️ 의무 진단
          </Btn>
        </div>

        {/* 미확인 알림 */}
        {pendingCount > 0 && (
          <Card style={{ background: '#fff5f5', borderColor: '#fed7d7', marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18 }}>🔔</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.red }}>
                  미승인 출퇴근 기록 {pendingCount}건
                </div>
                <div style={{ fontSize: 10, color: C.t3, marginTop: 2 }}>
                  근로자가 입력한 기록을 확인해주세요
                </div>
              </div>
              <Btn size="sm" onClick={() => setTab('attendance')}>확인</Btn>
            </div>
          </Card>
        )}

        {/* 데모 안내 */}
        <Card style={{ background: '#eff6ff', borderColor: '#bfdbfe' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.blue, marginBottom: 4 }}>
            ℹ️ 데모 버전
          </div>
          <div style={{ fontSize: 11, color: C.t2, lineHeight: 1.6 }}>
            샘플 근로자 3명이 등록되어 있습니다. 데이터는 이 기기에만 저장됩니다.
          </div>
          <Btn variant="ghost" size="sm" style={{ width: '100%', marginTop: 10 }}
               onClick={() => {
                 if (confirm('모드 선택으로 돌아갈까요? (데이터는 유지됩니다)')) {
                   setData({ ...data, mode: null });
                 }
               }}>
            🔄 근로자 모드 체험하기
          </Btn>
        </Card>
      </div>
    </div>
  );
}

function EfficRow({ icon, label, detail, min }) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  const display = h > 0 ? `${h}시간 ${m > 0 ? m + '분' : ''}` : `${m}분`;
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      padding: '5px 0', borderBottom: '1px solid rgba(45,138,90,0.1)'
    }}>
      <span style={{ fontSize: 13 }}>{icon}</span>
      <div style={{ flex: 1 }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.t1 }}>{label}</span>
        <span style={{ fontSize: 10, color: C.t3, marginLeft: 6 }}>{detail}</span>
      </div>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.green }}>{display} 절약</div>
    </div>
  );
}

/* ============================================================
   근로자 탭
============================================================ */
function WorkersTab({ data, setData }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);

  if (showAdd || editing) {
    return <WorkerForm
      worker={editing}
      onSave={(w) => {
        if (editing) {
          setData({ ...data, workers: data.workers.map(x => x.id === w.id ? w : x) });
        } else {
          setData({ ...data, workers: [...data.workers, { ...w, id: 'w' + Date.now() }] });
        }
        setShowAdd(false);
        setEditing(null);
      }}
      onCancel={() => { setShowAdd(false); setEditing(null); }}
    />;
  }

  return (
    <div>
      <Header title="근로자 관리" subtitle={`재직 ${data.workers.length}명`} />
      <div style={{ padding: 16 }}>
        <Btn onClick={() => setShowAdd(true)} style={{ width: '100%', marginBottom: 14 }} size="lg">
          + 근로자 등록 (계약서 작성)
        </Btn>

        {data.workers.length === 0 ? (
          <Card style={{ textAlign: 'center', padding: 32, color: C.t3 }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>👥</div>
            <div style={{ fontSize: 13 }}>등록된 근로자가 없습니다</div>
          </Card>
        ) : (
          data.workers.map(w => (
            <Card key={w.id} style={{ marginBottom: 10 }} onClick={() => setEditing(w)}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer' }}
                   onClick={() => setEditing(w)}>
                <div style={{
                  width: 42, height: 42, borderRadius: 21,
                  background: 'linear-gradient(145deg,#f0e8d0,#e8d9a0)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 18, flexShrink: 0
                }}>👤</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <span style={{ fontWeight: 800, fontSize: 14, color: C.t1 }}>{w.name}</span>
                    <Badge color="gold">{w.type}</Badge>
                    {w.signed && <Badge color="green">✓ 계약서</Badge>}
                  </div>
                  <div style={{ fontSize: 11, color: C.t3, lineHeight: 1.6 }}>
                    시급 {w.hourly.toLocaleString()}원 · 소정 {w.sojeongH}h<br/>
                    입사 {w.joinDate} · {w.phone}
                  </div>
                </div>
                <div style={{ color: C.t3, fontSize: 18 }}>›</div>
              </div>
            </Card>
          ))
        )}
      </div>
    </div>
  );
}

function WorkerForm({ worker, onSave, onCancel }) {
  const [form, setForm] = useState(worker || {
    name: '', phone: '', birth: '',
    type: '정규직', hourly: 10320, sojeongH: 8,
    joinDate: todayStr(), contractType: '기간없음', signed: false,
  });
  const [step, setStep] = useState(1);

  const update = (k, v) => setForm({ ...form, [k]: v });

  return (
    <div>
      <Header title={worker ? '근로자 정보' : '근로자 등록'}
              subtitle={`${step}/2 단계`}
              onBack={onCancel} />
      <div style={{ padding: 16 }}>
        {step === 1 && (
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: C.t1, marginBottom: 12 }}>1️⃣ 기본 정보</div>
            <Field label="이름" value={form.name} onChange={v => update('name', v)} />
            <Field label="연락처" value={form.phone} onChange={v => update('phone', v)} placeholder="010-0000-0000" />
            <Field label="생년월일" type="date" value={form.birth} onChange={v => update('birth', v)} />

      ...data,
      attendance: data.attendance.map(a => a.id === recId ? { ...a, status: 'approved' } : a)

/* 휴게시간 안내 컴포넌트 */
function BreakGuide({ rawH, breakH, netH }) {
  const legal = legalBreakH(rawH);
  const isUnder = breakH < legal && rawH >= 4;
  return (
    <div style={{
      marginTop: 6, padding: '7px 10px', borderRadius: 7, fontSize: 10,
      lineHeight: 1.6,
      background: isUnder ? '#fff5f5' : '#f0fdf4',
      borderColor: isUnder ? '#fed7d7' : '#bbf7d0',
      border: '1px solid',
      color: isUnder ? C.red : C.green
    }}>
      {isUnder
        ? `⚠️ ${rawH.toFixed(1)}h 근무 시 법정 휴게 ${legal}h 이상 필요 (근기법 §54)`
        : `✓ 실 근무시간: ${netH.toFixed(1)}h (총 ${rawH.toFixed(1)}h - 휴게 ${breakH}h)`}
      {rawH >= 4 && <span style={{ marginLeft: 6, opacity: 0.8 }}>
        · 법정기준: {rawH >= 8 ? '8h↑→1h' : '4h↑→30분'}
      </span>}
    </div>
  );
}

function PayrollTab({ data }) {
  const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
  const [selectedWorker, setSelectedWorker] = useState(null);
  const [showPayslip, setShowPayslip] = useState(false);

  // 월별 집계
  const calcWorkerPay = (worker) => {
    const recs = data.attendance.filter(a =>
      a.workerId === worker.id &&
      a.date.startsWith(selectedMonth) &&
      a.status === 'approved' &&
      a.outT
    );

    let totalH = 0, sojeongTotal = 0, overtimeTotal = 0;
    recs.forEach(r => {
      const [inH, inM] = r.inT.split(':').map(Number);
      const [outH, outM] = r.outT.split(':').map(Number);
      const raw = (outH + outM/60) - (inH + inM/60);
      if (raw <= 0) return;
      const brk = (r.breakH !== undefined && r.breakH !== null && r.breakH !== '')
        ? Number(r.breakH) : legalBreakH(raw);
      const hours = Math.max(0, raw - brk);
      totalH += hours;
      const sj = Math.min(hours, worker.sojeongH);
      sojeongTotal += sj;
      overtimeTotal += Math.max(0, hours - worker.sojeongH);
    });

    const basePay = sojeongTotal * worker.hourly;
    const overtimePay = overtimeTotal * worker.hourly * 1.5;

    // 주휴수당 (간단 계산: 주 소정 15시간 이상이면 1주당 주휴 발생)
    const weeks = Math.floor(recs.length / 5); // 단순화
    const weeklyHoliday = weeks * Math.min((worker.sojeongH * 5 / 40) * 8, 8) * worker.hourly;

    const total = basePay + overtimePay + weeklyHoliday;

    return {
      days: recs.length,
      totalH: totalH.toFixed(1),
      sojeongTotal: sojeongTotal.toFixed(1),
      overtimeTotal: overtimeTotal.toFixed(1),
      basePay: Math.round(basePay),
      overtimePay: Math.round(overtimePay),
      weeklyHoliday: Math.round(weeklyHoliday),
      total: Math.round(total),
    };
  };

  if (selectedWorker) {
    const pay = calcWorkerPay(selectedWorker);
    return (
      <div>
        <Header title={`${selectedWorker.name} 급여명세서`}
                subtitle={`${selectedMonth}`}
                onBack={() => setSelectedWorker(null)} />
        <div style={{ padding: 16 }}>
          <Card style={{ background: goldGrad, color: '#fff', border: 'none', marginBottom: 14 }}>
            <div style={{ fontSize: 11, opacity: 0.85 }}>지급 총액</div>
            <div style={{ fontSize: 28, fontWeight: 900, marginTop: 4 }}>
              {pay.total.toLocaleString()}<span style={{ fontSize: 14 }}>원</span>
            </div>
            <div style={{ fontSize: 10, opacity: 0.85, marginTop: 4 }}>
              근무 {pay.days}일 · 총 {pay.totalH}시간
            </div>
          </Card>

          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 10 }}>📋 산정 내역</div>
            <PayRow label="기본급" detail={`${pay.sojeongTotal}h × ${selectedWorker.hourly.toLocaleString()}원`} value={pay.basePay} />
            <PayRow label="연장수당" detail={`${pay.overtimeTotal}h × ${selectedWorker.hourly.toLocaleString()}원 × 1.5`} value={pay.overtimePay} />
            <PayRow label="주휴수당" detail="주 소정 15h 이상 개근" value={pay.weeklyHoliday} />
            <div style={{ borderTop: `2px solid ${C.gold}`, marginTop: 10, paddingTop: 10,
                          display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontWeight: 800 }}>합계</span>
              <span style={{ fontWeight: 900, color: C.goldD, fontSize: 16 }}>
                {pay.total.toLocaleString()}원
              </span>
            </div>
          </Card>

          {/* 최저임금 체크 */}
          {(() => {
            const effHourly = (pay.totalH > 0) ? pay.total / parseFloat(pay.totalH) : 0;
            const minOK = effHourly >= 10320;
            return (
              <Card style={{
                background: minOK ? '#f0fdf4' : '#fff5f5',
                borderColor: minOK ? '#bbf7d0' : '#fed7d7',
                marginBottom: 14
              }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: minOK ? C.green : C.red }}>
                  {minOK ? '✓ 최저임금 충족' : '⚠️ 최저임금 미달 가능성'}
                </div>
                <div style={{ fontSize: 11, color: C.t2, marginTop: 4, lineHeight: 1.6 }}>
                  실질시급: {Math.round(effHourly).toLocaleString()}원 / 2026년 최저시급 10,320원
                </div>
              </Card>
            );
          })()}

          <Btn style={{ width: '100%' }} size="lg" onClick={() => setShowPayslip(true)}>
            📄 임금명세서 보기 / 인쇄
          </Btn>
        </div>
        {showPayslip && (
          <Payslip
            worker={selectedWorker}
            pay={pay}
            month={selectedMonth}
            bizName={data.bizName}
            onClose={() => setShowPayslip(false)}
          />
        )}
      </div>
    );
  }

  return (
    <div>
      <Header title="급여 계산" subtitle="출퇴근 기록 자동 집계" />
      <div style={{ padding: 16 }}>
        <Card style={{ marginBottom: 14, padding: 10 }}>
          <input type="month" value={selectedMonth}
                 onChange={e => setSelectedMonth(e.target.value)}
                 style={{
                   width: '100%', padding: '8px',
                   fontSize: 13, fontWeight: 700, color: C.t1,
                   border: `1.5px solid ${C.border}`, borderRadius: 7,

/* ============================================================
   임금명세서 (근기법 §48 양식)
   - 모달 전체화면, 인쇄 가능
============================================================ */
function Payslip({ worker, pay, month, bizName, onClose }) {
  // 공제 계산 (4대보험 + 소득세 간이)
  const gross = pay.total;
  const NPS = Math.round(gross * 0.045);        // 국민연금 4.5%
  const HI = Math.round(gross * 0.03545);       // 건강보험 3.545%
  const LTC = Math.round(HI * 0.1295);          // 장기요양 (건보의 12.95%)
  const EI = Math.round(gross * 0.009);         // 고용보험 0.9%
  const incomeTax = gross < 1060000 ? 0 : Math.round(gross * 0.013); // 간이세액
  const localTax = Math.round(incomeTax * 0.1); // 지방소득세
  const deductTotal = NPS + HI + LTC + EI + incomeTax + localTax;
  const netPay = gross - deductTotal;

  const [y, m] = month.split('-');
  const payDate = `${y}년 ${parseInt(m)+1}월 10일`; // 다음달 10일 지급 가정

  const handlePrint = () => {
    const printWindow = window.open('', '_blank', 'width=800,height=900');
    const content = document.getElementById('payslip-print').innerHTML;
    printWindow.document.write(`
      <!DOCTYPE html><html><head><meta charset="UTF-8"><title>임금명세서_${worker.name}_${month}</title>
      <style>
        @page { size: A4; margin: 15mm; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #2a3142; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #444; padding: 6px 8px; font-size: 11px; }
        th { background: #f0e8d0; font-weight: 700; }
        h1 { text-align: center; font-size: 18px; margin: 0 0 16px; }
        .meta { margin-bottom: 10px; font-size: 11px; }
        .total-row { background: #fffbeb; font-weight: 700; }
        .net-row { background: #b8922a; color: #fff; font-weight: 700; font-size: 13px; }
        .right { text-align: right; }
        .center { text-align: center; }
        .small { font-size: 9px; color: #666; }
      </style></head><body>${content}</body></html>
    `);
    printWindow.document.close();
    setTimeout(() => { printWindow.print(); }, 300);
  };

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      background: 'rgba(0,0,0,0.5)', zIndex: 200,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      overflow: 'auto', padding: '20px 10px'
    }} onClick={onClose}>
      <div style={{
        background: '#fff', borderRadius: 12,
        maxWidth: 560, width: '100%',
        boxShadow: '0 8px 40px rgba(0,0,0,0.3)'
      }} onClick={e => e.stopPropagation()}>
        {/* 상단 액션 바 */}
        <div style={{
          display: 'flex', gap: 8, padding: 12,
          borderBottom: `1px solid ${C.border}`,
          position: 'sticky', top: 0, background: '#fff', zIndex: 1,
          borderTopLeftRadius: 12, borderTopRightRadius: 12
        }}>
          <Btn variant="secondary" onClick={onClose} size="sm">✕ 닫기</Btn>
          <div style={{ flex: 1 }} />
          <Btn onClick={handlePrint} size="sm">🖨️ 인쇄 / PDF</Btn>
        </div>

        {/* 명세서 본문 (인쇄용 ID) */}
        <div id="payslip-print" style={{ padding: '20px 16px' }}>
          <h1 style={{ textAlign: 'center', fontSize: 18, fontWeight: 900,
                       color: C.t1, marginBottom: 6 }}>
            임 금 명 세 서
          </h1>
          <div style={{ textAlign: 'center', fontSize: 10, color: C.t3, marginBottom: 14 }}>
            근로기준법 제48조 제2항 / 시행령 제27조의2
          </div>

          {/* 사업장·근로자 정보 */}
          <div className="meta" style={{ fontSize: 11, color: C.t2, marginBottom: 10, lineHeight: 1.8 }}>
            <div><strong>사업장명:</strong> {bizName}</div>
            <div><strong>지급일:</strong> {payDate}</div>
            <div><strong>임금 산정기간:</strong> {y}.{m}.01 ~ {y}.{m}.{new Date(y, m, 0).getDate()}</div>
          </div>

          {/* 인적사항 */}
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 12, fontSize: 11 }}>
            <tbody>
              <tr>
                <th style={thS}>성명</th>
                <td style={tdS}>{worker.name}</td>
                <th style={thS}>생년월일</th>
                <td style={tdS}>{worker.birth || '-'}</td>
              </tr>
              <tr>
                <th style={thS}>입사일</th>
                <td style={tdS}>{worker.joinDate}</td>
                <th style={thS}>고용형태</th>
                <td style={tdS}>{worker.type}</td>
              </tr>
            </tbody>
          </table>

          {/* 지급 내역 */}
          <div style={{ fontWeight: 800, fontSize: 12, marginBottom: 6, color: C.t1 }}>
            ① 지급 항목
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 14, fontSize: 11 }}>
            <thead>
              <tr>
                <th style={thS}>항목</th>
                <th style={thS}>계산방법 (산정 기초)</th>
                <th style={{...thS, textAlign:'right'}}>금액 (원)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={tdS}>기본급</td>
                <td style={{...tdS, fontSize: 10}}>
                  소정근로 {pay.sojeongTotal}h × {worker.hourly.toLocaleString()}원
                </td>
                <td style={{...tdS, textAlign: 'right'}}>{pay.basePay.toLocaleString()}</td>
              </tr>
              {pay.overtimePay > 0 && (
                <tr>
                  <td style={tdS}>연장근로수당</td>
                  <td style={{...tdS, fontSize: 10}}>
                    연장 {pay.overtimeTotal}h × {worker.hourly.toLocaleString()}원 × 1.5
                  </td>
                  <td style={{...tdS, textAlign: 'right'}}>{pay.overtimePay.toLocaleString()}</td>
                </tr>
              )}
              {pay.weeklyHoliday > 0 && (
                <tr>
                  <td style={tdS}>주휴수당</td>
                  <td style={{...tdS, fontSize: 10}}>
                    주 소정 15h↑ 개근 (근기법 §55)
                  </td>
                  <td style={{...tdS, textAlign: 'right'}}>{pay.weeklyHoliday.toLocaleString()}</td>
                </tr>
              )}
              <tr style={{ background: '#fffbeb', fontWeight: 700 }}>
                <td style={tdS} colSpan={2}>지급 합계 (A)</td>
                <td style={{...tdS, textAlign: 'right', color: C.goldD}}>
                  {gross.toLocaleString()}
                </td>
              </tr>
            </tbody>
          </table>

          {/* 공제 내역 */}
          <div style={{ fontWeight: 800, fontSize: 12, marginBottom: 6, color: C.t1 }}>
            ② 공제 항목
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 14, fontSize: 11 }}>
            <thead>
              <tr>
                <th style={thS}>항목</th>
                <th style={thS}>요율</th>
                <th style={{...thS, textAlign:'right'}}>금액 (원)</th>
              </tr>
            </thead>
            <tbody>
              <DeductRow label="국민연금" rate="4.5%" value={NPS} />
              <DeductRow label="건강보험" rate="3.545%" value={HI} />
              <DeductRow label="장기요양보험" rate="건보의 12.95%" value={LTC} />
              <DeductRow label="고용보험" rate="0.9%" value={EI} />
              <DeductRow label="소득세" rate="간이세액표" value={incomeTax} />
              <DeductRow label="지방소득세" rate="소득세의 10%" value={localTax} />
              <tr style={{ background: '#fff5f5', fontWeight: 700 }}>
                <td style={tdS} colSpan={2}>공제 합계 (B)</td>
                <td style={{...tdS, textAlign: 'right', color: C.red}}>
                  {deductTotal.toLocaleString()}
                </td>
              </tr>
            </tbody>
          </table>

          {/* 실지급액 */}
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 14 }}>
            <tbody>
              <tr style={{ background: C.gold, color: '#fff' }}>
                <td style={{...tdS, fontWeight: 800, fontSize: 13, borderColor: C.goldD}}>
                  실 지급액 (A - B)
                </td>
                <td style={{...tdS, textAlign: 'right', fontWeight: 900,
                             fontSize: 15, borderColor: C.goldD}}>
                  {netPay.toLocaleString()} 원
                </td>
              </tr>
            </tbody>
          </table>

          {/* 근로시간 정보 */}
          <div style={{ fontWeight: 800, fontSize: 12, marginBottom: 6, color: C.t1 }}>
            ③ 근로시간 내역
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 14, fontSize: 11 }}>
            <tbody>
              <tr>
                <th style={thS}>근무일수</th>
                <td style={tdS}>{pay.days}일</td>
                <th style={thS}>총 근로시간</th>
                <td style={tdS}>{pay.totalH}시간</td>
              </tr>
              <tr>
                <th style={thS}>소정근로</th>
                <td style={tdS}>{pay.sojeongTotal}h</td>
                <th style={thS}>연장근로</th>
                <td style={tdS}>{pay.overtimeTotal}h</td>
              </tr>
            </tbody>
          </table>

          {/* 안내 */}
          <div style={{ fontSize: 9, color: C.t3, lineHeight: 1.6, marginTop: 14,
                        padding: 10, background: '#f9fafb', borderRadius: 6 }}>
            ※ 본 명세서는 근로기준법 제48조 제2항 및 동법 시행령 제27조의2에 따라 교부됩니다.<br/>
            ※ 공제 요율은 2026년 기준 추정치이며, 실제 부과액은 보험료 산정기준에 따라 달라질 수 있습니다.<br/>
            ※ 명세서 미교부 시 500만원 이하 과태료 (근기법 §116).
          </div>
        </div>
      </div>
    </div>
  );
}

const thS = {

  fontWeight: 700,
  fontSize: 10,

/* ============================================================
   진단 탭 (간소화)
============================================================ */
function DiagnosisTab({ data }) {
  const n = data.workers.length;
  const items = [
    { t: '근로계약서 서면 작성·교부', s: 'all', heavy: true, b: '근기법 §17' },
    { t: '임금명세서 교부', s: 'all', b: '근기법 §48' },
    { t: '최저임금 준수', s: 'all', heavy: true, b: '최저임금법' },
    { t: '주휴수당 (주 15h↑)', s: 'all', b: '근기법 §55' },
    { t: '연차유급휴가', s: 'n5', b: '근기법 §60' },
    { t: '연장·야간·휴일 가산수당', s: 'n5', b: '근기법 §56' },
    { t: '해고 서면통지', s: 'n5', b: '근기법 §27' },
    { t: '취업규칙 작성·신고', s: 'n10', b: '근기법 §93' },
    { t: '직장내괴롭힘 조치의무', s: 'n5', b: '근기법 §76의2' },
    { t: '4대보험 가입', s: 'all', b: '각 보험법' },
    { t: '산업안전보건교육', s: 'n5', b: '산안법' },
    { t: '중대재해처벌법', s: 'n5', heavy: true, b: '중처법' },
  ];

  const check = (s) => {
    if (s === 'all') return true;
    if (s === 'n5') return n >= 5;
    if (s === 'n10') return n >= 10;
    return false;
  };

  const applied = items.filter(i => check(i.s));

  return (
    <div>
      <Header title="의무사항 진단" subtitle={`현재 인원 ${n}명 기준`} />
      <div style={{ padding: 16 }}>
        <Card style={{ background: goldGrad, color: '#fff', border: 'none', marginBottom: 14 }}>
          <div style={{ fontSize: 11, opacity: 0.85 }}>적용 의무 항목</div>
          <div style={{ fontSize: 24, fontWeight: 900, marginTop: 4 }}>
            {applied.length}<span style={{ fontSize: 12 }}> / {items.length}개</span>
          </div>
          <div style={{ fontSize: 10, opacity: 0.85, marginTop: 4 }}>
            근로자 수에 따라 자동 판정됩니다
          </div>
        </Card>

        {items.map((item, i) => {
          const ok = check(item.s);
          return (
            <Card key={i} style={{
              marginBottom: 8, padding: 12,
              opacity: ok ? 1 : 0.5,
              borderColor: ok ? (item.heavy ? '#fed7d7' : C.borderGold) : C.border
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 16 }}>{ok ? '✅' : '⚪'}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontWeight: 700, fontSize: 13, color: C.t1 }}>{item.t}</span>
                    {item.heavy && <Badge color="red">중대</Badge>}
                  </div>
                  <div style={{ fontSize: 10, color: C.t3, marginTop: 2 }}>
                    {item.b} · {item.s === 'all' ? '1인 이상' : item.s === 'n5' ? '5인 이상' : '10인 이상'}
                  </div>
                </div>
              </div>
            </Card>
          );
        })}

        <Card style={{ marginTop: 14, background: '#eff6ff', borderColor: '#bfdbfe' }}>
          <div style={{ fontSize: 11, color: C.blue, lineHeight: 1.6 }}>
            ℹ️ 실제 앱의 의무진단은 62개 항목, 10개 카테고리, 업종별 세부 판정을 제공합니다.
            여기서는 12개 핵심 항목만 데모로 표시합니다.
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   개인 기록 모드 (근로자 본인용)

function PersonalApp({ data, setData }) {
  const [tab, setTab] = useState('home');
  const p = data.personal;

  if (!p.name || !p.workplace) {
    return <PersonalSetup data={data} setData={setData} />;
  }

  return (
    <div>
      {tab === 'home'     && <PersonalHome data={data} setData={setData} setTab={setTab} />}
      {tab === 'record'   && <PersonalRecord data={data} setData={setData} />}
      {tab === 'pay'      && <PersonalPayCheck data={data} setData={setData} />}
      {tab === 'check'    && <PersonalSelfCheck data={data} setData={setData} />}
      {tab === 'help'     && <PersonalHelp data={data} setData={setData} />}
      <PersonalNav tab={tab} setTab={setTab} />
    </div>
  );
}

function PersonalNav({ tab, setTab }) {

    { k: 'home',   icon: '🏠', label: '홈' },
    { k: 'record', icon: '🕐', label: '출퇴근' },

    }}>

/* ---- 개인 모드: 초기 설정 ---- */
function PersonalSetup({ data, setData }) {
  const [form, setForm] = useState({
    name: data.personal.name || '',
    workplace: data.personal.workplace || '',
    hourly: data.personal.hourly || 10320,
    sojeongH: data.personal.sojeongH || 8,
  });

  const save = () => {
    if (!form.name || !form.workplace) {
      alert('이름과 일하는 곳을 입력해주세요');
      return;
    }
    setData({ ...data, personal: { ...data.personal, ...form } });
  };

  return (
    <div>
      <Header title="내 정보 입력"
              subtitle="혼자만 보는 기록입니다"
              onBack={() => setData({ ...data, mode: null })} />
      <div style={{ padding: 16 }}>
        <div style={{
          background: '#eff6ff', border: '1px solid #bfdbfe',
          borderRadius: 10, padding: 12, marginBottom: 14,
          fontSize: 11, color: C.t2, lineHeight: 1.6
        }}>
          💡 사장님과 상관없이 본인이 직접 기록하는 모드입니다.<br/>
          입력한 정보는 <strong>본인 휴대폰에만 저장</strong>되며,
          나중에 임금 분쟁이 생겼을 때 증거자료로 쓸 수 있습니다.
        </div>

        <Card>
          <Field label="이름 (별명도 OK)" value={form.name}
                 onChange={v => setForm({ ...form, name: v })} placeholder="홍길동" />
          <Field label="일하는 곳" value={form.workplace}
                 onChange={v => setForm({ ...form, workplace: v })}
                 placeholder="○○카페 / ○○편의점 등" />
          <Field label="시급 (모르면 그대로 두세요)" type="number" value={form.hourly}
                 onChange={v => setForm({ ...form, hourly: Number(v) })} />
          <div style={{ fontSize: 10, color: C.t3, marginTop: -8, marginBottom: 10 }}>
            ※ 2026년 최저시급: 10,320원 — 이보다 낮으면 위법
          </div>
          <Field label="1일 약속한 근로시간 (h)" type="number" value={form.sojeongH}
                 onChange={v => setForm({ ...form, sojeongH: Number(v) })} />

          <Btn onClick={save} style={{ width: '100%', marginTop: 8,
                  background: 'linear-gradient(135deg,#3b6ec4,#2d5aa8)' }} size="lg">
            ✓ 시작하기
          </Btn>
        </Card>

/* ---- 개인 모드: 출퇴근 기록 ---- */
/* GPS 좌표 취득 헬퍼 */
function getGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({
        lat: p.coords.latitude.toFixed(6),
        lng: p.coords.longitude.toFixed(6),
        acc: Math.round(p.coords.accuracy),
      }),
      () => resolve(null),
      { timeout: 8000, enableHighAccuracy: true }
    );
  });
}

/* 현재 시각 문자열 */
function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

/* 카카오/구글맵 링크 */
function mapLink(lat, lng) {
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

    setGpsLoading(true);
    const gps = useGPS ? await getGPS() : null;
    setGpsLoading(false);

      id: todayRec?.id || ('pr' + Date.now()),
      date: today,
      inT: t,

/* ---- 개인 모드: 임금 비교 ---- */
function PersonalPayCheck({ data, setData }) {
  const p = data.personal;
  const [month, setMonth] = useState(new Date().toISOString().slice(0, 7));
  const [actualInput, setActualInput] = useState('');

  const monthRecs = p.records.filter(r => r.date.startsWith(month) && r.outT);
  const calc = calcPersonalPay(monthRecs, p);

  const actualEntry = p.actualReceived.find(a => a.month === month);
  const actual = actualEntry?.amount || 0;
  const diff = actual - calc.total;

  const saveActual = () => {
    const amt = Number(actualInput.replace(/,/g, ''));
    if (!amt) return;
    const others = p.actualReceived.filter(a => a.month !== month);
    setData({
      ...data,
      personal: { ...p, actualReceived: [...others, { month, amount: amt }] }
    });
    setActualInput('');
  };

  return (
    <div>
      <Header title="내 임금 확인" subtitle="받아야 할 금액 vs 실제 받은 금액" />
      <div style={{ padding: 16 }}>
        <Card style={{ marginBottom: 14, padding: 10 }}>
          <input type="month" value={month} onChange={e => setMonth(e.target.value)}
                 style={{
                   width: '100%', padding: '8px', fontSize: 13, fontWeight: 700,
                   color: C.t1, border: `1.5px solid ${C.border}`, borderRadius: 7,
                   fontFamily: 'inherit', outline: 'none', textAlign: 'center'
                 }} />
        </Card>

        {/* 받아야 할 임금 상세 */}
        <Card style={{ marginBottom: 14,
                       background: 'linear-gradient(135deg,#3b6ec4,#2d5aa8)',
                       color: '#fff', border: 'none' }}>
          <div style={{ fontSize: 11, opacity: 0.85 }}>받아야 할 임금 (계산값)</div>
          <div style={{ fontSize: 24, fontWeight: 900, marginTop: 4 }}>
            {calc.total.toLocaleString()}<span style={{ fontSize: 12 }}>원</span>
          </div>
          <div style={{ fontSize: 10, opacity: 0.85, marginTop: 8, lineHeight: 1.7 }}>
            기본급 {calc.basePay.toLocaleString()}원<br/>
            {calc.overtimePay > 0 && `연장수당 ${calc.overtimePay.toLocaleString()}원\n`}
            {calc.overtimePay > 0 && <br/>}
            주휴수당 {calc.weeklyHoliday.toLocaleString()}원<br/>
            (근무 {calc.days}일 · 총 {calc.totalH}h)
          </div>
        </Card>

        {/* 실제 받은 금액 입력 */}
        <Card style={{ marginBottom: 14 }}>
          <div style={{ fontWeight: 800, fontSize: 13, color: C.t1, marginBottom: 10 }}>
            💵 실제로 받은 금액 입력
          </div>
          {actual > 0 ? (
            <div>
              <div style={{ fontSize: 11, color: C.t3, marginBottom: 4 }}>
                저장된 금액
              </div>
              <div style={{ fontSize: 20, fontWeight: 900, color: C.t1, marginBottom: 10 }}>
                {actual.toLocaleString()}원
              </div>
              <Btn variant="secondary" size="sm" onClick={() => {
                setActualInput(String(actual));
                setData({
                  ...data,
                  personal: {
                    ...p,
                    actualReceived: p.actualReceived.filter(a => a.month !== month)
                  }
                });
              }}>수정</Btn>
            </div>
          ) : (
            <div>
              <div style={{ display: 'flex', gap: 6 }}>
                <input type="text" value={actualInput}
                       onChange={e => setActualInput(e.target.value)}
                       placeholder="예: 1,500,000"
                       style={{
                         flex: 1, padding: '10px 12px', fontSize: 13, color: C.t1,
                         border: `1.5px solid ${C.border}`, borderRadius: 8,
                         background: '#fff', fontFamily: 'inherit', outline: 'none'
                       }} />
                <Btn onClick={saveActual} size="md"
                     style={{ background: 'linear-gradient(135deg,#3b6ec4,#2d5aa8)' }}>
                  저장
                </Btn>
              </div>
              <div style={{ fontSize: 10, color: C.t3, marginTop: 6 }}>
                통장에 실제 입금된 세후 금액을 입력하세요
              </div>
            </div>
          )}
        </Card>

        {/* 비교 결과 */}
        {actual > 0 && (
          <Card style={{
            background: diff < -10000 ? '#fff5f5' :
                       diff > 10000 ? '#f0fdf4' : '#fffbeb',
            borderColor: diff < -10000 ? '#fed7d7' :
                        diff > 10000 ? '#bbf7d0' : '#fde68a',
            marginBottom: 14
          }}>
            <div style={{ fontSize: 13, fontWeight: 900,
                          color: diff < -10000 ? C.red : diff > 10000 ? C.green : C.goldD,
                          marginBottom: 6 }}>
              {diff < -10000 ? '⚠️ 미지급 의심' :
               diff > 10000 ? '✓ 더 받았어요' : '✓ 거의 일치'}
            </div>
            <div style={{ fontSize: 11, color: C.t2, lineHeight: 1.7 }}>
              받아야 할 금액: {calc.total.toLocaleString()}원<br/>
              실제 받은 금액: {actual.toLocaleString()}원<br/>
              <strong style={{
                color: diff < -10000 ? C.red : diff > 10000 ? C.green : C.t1
              }}>
                차이: {diff >= 0 ? '+' : ''}{diff.toLocaleString()}원
              </strong>
            </div>
            {diff < -10000 && (
              <div style={{ marginTop: 10, padding: 10,
                            background: '#fff', borderRadius: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.red, marginBottom: 4 }}>
                  💡 이렇게 해보세요
                </div>
                <div style={{ fontSize: 10, color: C.t2, lineHeight: 1.7 }}>
                  1. 먼저 사장님께 조용히 확인 요청 (실수일 수 있어요)<br/>
                  2. 4대보험·세금 공제로 차이가 날 수 있으니 명세서 요청<br/>
                  3. 그래도 차이가 크면 → <strong>고용노동부 1350</strong>으로 상담<br/>
                  4. 본 앱의 출퇴근 기록은 진정 시 증거자료가 됩니다
                </div>
              </div>
            )}
          </Card>
        )}

        {/* 계산 안내 */}
        <div style={{ fontSize: 10, color: C.t3, padding: 10, lineHeight: 1.7,
                      background: '#f9fafb', borderRadius: 8 }}>
          ※ 받아야 할 임금은 세전 금액 기준입니다. 실수령액과 비교 시 4대보험·세금 공제(약 9~10%)를 감안하세요.<br/>
          ※ 본 계산은 추정치이며, 실제 사업장 사정에 따라 다를 수 있습니다.
        </div>
      </div>
    </div>
  );
}

/* ---- 개인 모드: 내 권리 자가진단 ---- */
function PersonalSelfCheck({ data }) {
  const p = data.personal;
  const allRecs = p.records.filter(r => r.outT);
  const totalH = allRecs.reduce((s, r) => s + calcDayHours(r), 0);

  // 최근 4주 데이터
  const now = new Date();
  const weeks = [0,1,2,3].map(w => {
    const start = new Date(now);
    start.setDate(start.getDate() - (w+1)*7);
    const end = new Date(now);
    end.setDate(end.getDate() - w*7);
    const recs = allRecs.filter(r => {
      const d = new Date(r.date);
      return d >= start && d < end;
    });
    const wH = recs.reduce((s, r) => s + calcDayHours(r), 0);
    return { week: w+1, days: recs.length, hours: wH };
  });

  const items = [
    {
      icon: '💵',
      title: '최저임금',
      law: '최저임금법 §6',
      ok: p.hourly >= 10320,
      okMsg: `시급 ${p.hourly.toLocaleString()}원 ✓ 최저임금(10,320원) 이상`,
      failMsg: `시급 ${p.hourly.toLocaleString()}원 — 최저임금(10,320원) 미달`,
      failAction: '사업주에게 시급 조정 요청 or 노동청 1350 상담',
      severity: 'high',
    },
    {
      icon: '🗓️',
      title: '주휴수당',
      law: '근기법 §55',
      ok: weeks.some(w => w.hours >= 15 && w.days >= 5),
      okMsg: '주 15시간 이상 개근 주가 있어 주휴수당 발생 가능',
      failMsg: '최근 4주 중 주 15시간 이상 + 개근 주가 없음',
      failAction: '주휴수당은 주 15시간 이상 + 개근 시 발생. 현재 기록으로는 발생 조건 미확인',
      severity: 'medium',
    },
    {
      icon: '📄',
      title: '근로계약서',
      law: '근기법 §17',
      ok: null, // 자가 확인 필요
      okMsg: null,
      failMsg: '계약서 교부 여부를 확인해주세요',
      selfCheck: true,
      failAction: '계약서 미교부는 사업주 500만원 이하 벌금. 요청할 권리가 있습니다.',
      severity: 'high',
    },
    {
      icon: '⏰',
      title: '연장근로수당',
      law: '근기법 §56',
      ok: allRecs.some(r => calcDayHours(r) > p.sojeongH),
      okMsg: '소정시간 초과 근무 기록 있음 → 연장수당(1.5배) 발생 대상',
      failMsg: '소정시간 초과 근무 기록 없음 (5인 미만 사업장 미적용)',
      failAction: '5인 이상 사업장에서 소정시간 초과 시 1.5배 가산. 명세서에서 확인하세요.',
      severity: 'medium',
    },
    {
      icon: '📊',
      title: '임금명세서',
      law: '근기법 §48',
      ok: null,
      okMsg: null,
      failMsg: '매월 임금 지급 시 명세서를 받아야 합니다',
      selfCheck: true,
      failAction: '미교부 시 사업주 500만원 이하 과태료. 요청하거나 앱 내 자동 계산 결과를 활용하세요.',
      severity: 'medium',
    },
    {
      icon: '🏥',
      title: '4대보험',
      law: '각 사회보험법',
      ok: null,
      okMsg: null,
      failMsg: '주 15시간 이상 또는 월 60시간 이상 근무 시 4대보험 가입 의무',
      selfCheck: true,
      failAction: '건강보험공단(1577-1000), 국민연금(1355) 가입 여부 확인 가능',
      severity: 'medium',
    },
  ];

  const [selfChecks, setSelfChecks] = useState({});

  return (
    <div>
      <Header title="내 권리 자가진단" subtitle="현재 기록 기준 자동 판정" />
      <div style={{ padding: 16 }}>

        </Card>

        {items.map((item, i) => {
          const checked = selfChecks[i];
          const isOk = item.selfCheck
            ? checked === true
            : item.ok === true;
          const isFail = item.selfCheck
            ? checked === false
            : item.ok === false;

          return (
            <Card key={i} style={{
              marginBottom: 10,
              borderColor: isOk ? '#bbf7d0'
                         : isFail ? (item.severity === 'high' ? '#fed7d7' : '#fde68a')

              background: isOk ? '#f0fdf4'
                        : isFail ? (item.severity === 'high' ? '#fff5f5' : '#fffbeb')
                        : '#fff'
            }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                    <span style={{ fontWeight: 800, fontSize: 13, color: C.t1 }}>{item.title}</span>
                    <span style={{ fontSize: 10, color: C.t3 }}>{item.law}</span>
                    {item.severity === 'high' && <Badge color="red">중요</Badge>}
                  </div>

                  {item.selfCheck ? (
                    <div>
                      <div style={{ fontSize: 11, color: C.t2, marginBottom: 8, lineHeight: 1.5 }}>
                        📌 직접 확인 필요 — {item.failMsg}
                      </div>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <Btn size="sm" variant={checked === true ? 'primary' : 'secondary'}
                             onClick={() => setSelfChecks({ ...selfChecks, [i]: true })}>
                          ✓ 받고 있어요
                        </Btn>
                        <Btn size="sm" variant={checked === false ? 'danger' : 'secondary'}
                             onClick={() => setSelfChecks({ ...selfChecks, [i]: false })}>
                          ✗ 못 받고 있어요
                        </Btn>
                      </div>
                    </div>
                  ) : (
                    <div style={{ fontSize: 11, lineHeight: 1.5,
                                  color: isOk ? C.green : isFail ? C.red : C.t2 }}>
                      {isOk ? `✓ ${item.okMsg}` : `✗ ${item.failMsg}`}
                    </div>
                  )}

                  {isFail && (
                    <div style={{
                      marginTop: 8, padding: 8,
                      background: 'rgba(0,0,0,0.04)', borderRadius: 6,
                      fontSize: 10, color: C.t2, lineHeight: 1.6
                    }}>
                      💬 {item.failAction}
                    </div>
                  )}
                </div>
              </div>
            </Card>
          );
        })}

        {/* 신고 안내 */}
        <Card style={{ background: 'linear-gradient(135deg,#3b6ec4,#2d5aa8)',
                       color: '#fff', border: 'none', marginTop: 6 }}>
          <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 6 }}>
            위반이 의심된다면?
          </div>
          <div style={{ fontSize: 11, opacity: 0.9, lineHeight: 1.7 }}>
            <a href="tel:1350" style={{ color: '#fff', fontWeight: 900, fontSize: 14 }}>
              ☎ 1350
            </a> 고용노동부 무료 상담<br/>
            홈 탭에서 증거 파일을 먼저 내보내세요
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ---- 개인 모드 유틸 ---- */
/* 법정 기본 휴게시간 계산 (근기법 §54) */
function legalBreakH(totalH) {
  if (totalH >= 8) return 1;
  if (totalH >= 4) return 0.5;
  return 0;
}

/* 실 근무시간 = 출퇴근 차이 - 휴게시간 */
function calcDayHours(r) {
  if (!r.inT || !r.outT) return 0;
  const [ih, im] = r.inT.split(':').map(Number);
  const [oh, om] = r.outT.split(':').map(Number);
  const raw = (oh + om/60) - (ih + im/60);
  if (raw <= 0) return 0;
  const brk = (r.breakH !== undefined && r.breakH !== null && r.breakH !== '')
    ? Number(r.breakH) : legalBreakH(raw);
  return Math.max(0, raw - brk);
}

function calcPersonalPay(records, p) {
  let totalH = 0, sojeongTotal = 0, overtimeTotal = 0;
  records.forEach(r => {
    const h = calcDayHours(r);
    if (h <= 0) return;
    totalH += h;
    const sj = Math.min(h, p.sojeongH);
    sojeongTotal += sj;
    overtimeTotal += Math.max(0, h - p.sojeongH);
  });
  const basePay = sojeongTotal * p.hourly;
  const overtimePay = overtimeTotal * p.hourly * 1.5;
  const weeks = Math.floor(records.length / 5);
  const weeklyHoliday = weeks * Math.min((p.sojeongH * 5 / 40) * 8, 8) * p.hourly;
  const total = basePay + overtimePay + weeklyHoliday;
  return {
    days: records.length,
    totalH: totalH.toFixed(1),
    sojeongTotal: sojeongTotal.toFixed(1),
    overtimeTotal: overtimeTotal.toFixed(1),
    basePay: Math.round(basePay),
    overtimePay: Math.round(overtimePay),
    weeklyHoliday: Math.round(weeklyHoliday),
    total: Math.round(total),
  };
}

    return <ModeSelect onSelect={(m) => setData({ ...data, mode: m })} />;
  }

  // 개인 기록 모드
  if (data.mode === 'personal') {
    return <PersonalApp data={data} setData={setData} />;
  }

  // 사업주 모드 (기존)
  return (
    <div>
      {tab === 'home' && <HomeTab data={data} setTab={setTab} setData={setData} />}

}
