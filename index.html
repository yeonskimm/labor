/* ═══════════════════════════════════════
   계산 엔진
═══════════════════════════════════════ */
const MIN_WAGE = 10320;
const DAYS = ["월","화","수","목","금","토","일"];
const toMin = t => { if(!t) return null; const[h,m]=t.split(":").map(Number); return h*60+(m||0); };
const resolveEnd = (inM, outM) => (outM !== null && outM <= inM) ? outM+1440 : outM;
const won = n => Math.round(n).toLocaleString("ko-KR");
const fmtH = m => { const h=Math.floor(m/60),mn=m%60; return mn?`${h}시간 ${mn}분`:`${h}시간`; };
const d2 = t => t ? t.replace(/-/g,".") : "　　　　";
const fill = (v,f="　　　　　") => v||f;

function nightMin(s,e){ let n=0; for(let m=s;m<e;m++){const h=m%1440;if(h>=1320||h<360)n++;} return n; }
const minToTime = m => { const mm=((m%1440)+1440)%1440; const h=Math.floor(mm/60),mn=mm%60; return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; };

// 시간(숫자)만 입력하는 간편 모드 - 야간 없이 소정/연장만 분리
function calcDaySimple(totalH, sojeongH, hourly, breakH=0, breakPaid=false){
  if(!totalH||totalH<=0) return null;
  // 무급 휴게는 실질 근무시간에서 차감
  const netH = breakPaid ? totalH : Math.max(0, totalH - breakH);
  const sojH=Math.min(netH,sojeongH);
  const otH=Math.max(0,netH-sojeongH);
  return {sojeongMin:sojH*60, otMin:otH*60, nightMin:0,
    sojPay:sojH*hourly, otPay:otH*hourly*1.5,
    totalPay:sojH*hourly+otH*hourly*1.5, simpleMode:true,
    breakH, breakPaid};
}

// 소정시간(시간 수)으로 자동 계산하는 버전
function calcDayH(inT, sojeongH, actT, hourly, is5plus, breakH=0, breakPaid=false){
  const inM=toMin(inT); if(inM===null) return null;
  const sojM=inM+sojeongH*60;
  const actRaw=toMin(actT);
  let rawActM=actRaw!==null?Math.max(sojM,resolveEnd(inM,actRaw)):sojM;
  // 무급 휴게: 실질 종료시간 앞당김
  const effActM = rawActM - (breakPaid ? 0 : breakH*60);
  const effSojM = Math.min(sojM, effActM);
  const soj=calcSeg(inM,effSojM,hourly,1.0,is5plus);
  const ot=effActM>effSojM?calcSeg(effSojM,effActM,hourly,1.5,is5plus):{min:0,nightMin:0,pay:0};
  return {sojeongMin:soj.min,otMin:ot.min,nightMin:soj.nightMin+ot.nightMin,
    totalPay:soj.pay+ot.pay,sojPay:soj.pay,otPay:ot.pay,sojEndMin:sojM,
    breakH, breakPaid};
}

function calcSeg(inAbs,outAbs,hourly,rate,is5plus){
  if(!inAbs||!outAbs||outAbs<=inAbs) return {min:0,nightMin:0,pay:0};
  const min=outAbs-inAbs;
  const nMin=is5plus?nightMin(inAbs,outAbs):0;
  const dMin=min-nMin;
  return {min, nightMin:nMin, pay:(dMin/60)*hourly*rate+(nMin/60)*hourly*(rate+0.5)};
}

function calcDay(inT,sojT,actT,hourly,is5plus){
  const inM=toMin(inT); if(inM===null) return null;
  const sojRaw=toMin(sojT); if(sojRaw===null) return null;
  const sojM=resolveEnd(inM,sojRaw);
  const actRaw=toMin(actT||sojT);
  const actM=Math.max(sojM, resolveEnd(inM,actRaw));
  const soj=calcSeg(inM,sojM,hourly,1.0,is5plus);
  const ot =actM>sojM?calcSeg(sojM,actM,hourly,1.5,is5plus):{min:0,nightMin:0,pay:0};
  return {sojeongMin:soj.min, otMin:ot.min, nightMin:soj.nightMin+ot.nightMin,
    totalPay:soj.pay+ot.pay, sojPay:soj.pay, otPay:ot.pay};
}

function calcWeek(schedule,hourly,is5plus,sojeongH=8){
  let sojMin=0,otMin=0,totalPay=0,nightTotal=0;
  const days={};
  DAYS.forEach(d=>{
    const s=schedule[d];
    if(!s) return;
    let r=null;
    if(s.inputMode==="hours"){
      // 시간입력은 이미 휴게를 제외한 실근로시간이므로 휴게 차감 안 함
      r = s.hours>0 ? calcDaySimple(s.hours,sojeongH,hourly,0,false) : null;
    } else {
      r = s.in ? calcDayH(s.in,sojeongH,s.out,hourly,is5plus,s.breakH||0,s.breakPaid||false) : null;
    }
    if(!r) return;
    days[d]=r; sojMin+=r.sojeongMin; otMin+=r.otMin;
    totalPay+=r.totalPay; nightTotal+=r.nightMin;
  });
  const hasJuhyu=sojMin>=15*60;
  const juhyuH=hasJuhyu?Math.min((sojMin/60)/40*8,8):0;
  const juhyuPay=juhyuH*hourly;
  return {days,sojMin,otMin,totalPay,nightTotal,hasJuhyu,juhyuH,juhyuPay,
    needMore:Math.max(0,15*60-sojMin),
    weekTotal:totalPay+juhyuPay, monthEst:(totalPay+juhyuPay)*4.345};
}

/* ═══════════════════════════════════════
   A4 스케일 래퍼 (모바일 대응)
═══════════════════════════════════════ */
const A4=794;
function ScaledPreview({children,pRef}){
  const wRef=useRef(null);
  const[scale,setScale]=useState(1);
  const obs=useRef(null);
  const setW=()=>{ if(wRef.current){ const w=wRef.current.offsetWidth; setScale(Math.min(1,(w-16)/A4)); }};
  useState(()=>{ setTimeout(setW,0); });
  useMemo(()=>{ obs.current=new ResizeObserver(setW); return()=>obs.current?.disconnect(); },[]);
  useMemo(()=>{ if(wRef.current&&obs.current) obs.current.observe(wRef.current); },[]);
  const scaledH=A4*1.414*scale;
  return(
    <div ref={wRef} style={{width:"100%",overflow:"hidden"}}>
      <div style={{width:A4,transformOrigin:"top left",transform:`scale(${scale})`,
        height:A4*1.414,marginBottom:scaledH-A4*1.414}}>
        <div ref={pRef}>{children}</div>
      </div>
    </div>
  );
}

const onlyDigits = s => String(s==null?'':s).replace(/[^0-9]/g,'');

function MoneyInput({style, value, onChange, placeholder}){

// ── 커스텀 날짜 선택기 (달력에서 날짜 누르면 즉시 선택) ──
const MONTHS_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WEEK_KO=['일','월','화','수','목','금','토'];
function DateInput({style, value, onChange, label}){
  const [open,setOpen]=useState(false);
  const today=new Date();
  const sel = value?new Date(value+'T00:00:00'):null;
  const [viewY,setViewY]=useState((sel||today).getFullYear());
  const [viewM,setViewM]=useState((sel||today).getMonth());

  const pick=(y,m,d)=>{
    const mm=String(m+1).padStart(2,'0');
    const dd=String(d).padStart(2,'0');
    onChange({target:{value:`${y}-${mm}-${dd}`}});
    setOpen(false);
  };

  // 달력 그리드 계산
  const firstDay=new Date(viewY,viewM,1).getDay();
  const daysInMonth=new Date(viewY,viewM+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const isSel=(d)=>sel&&sel.getFullYear()===viewY&&sel.getMonth()===viewM&&sel.getDate()===d;
  const isToday=(d)=>today.getFullYear()===viewY&&today.getMonth()===viewM&&today.getDate()===d;

  const prevMonth=()=>{ if(viewM===0){setViewM(11);setViewY(y=>y-1);}else setViewM(m=>m-1); };
  const nextMonth=()=>{ if(viewM===11){setViewM(0);setViewY(y=>y+1);}else setViewM(m=>m+1); };

  const dispText = value ? `${sel.getFullYear()}. ${sel.getMonth()+1}. ${sel.getDate()}` : (label||'날짜 선택');

  return(
    <div style={{position:'relative'}}>
      {/* 표시 버튼 */}
      <button type="button" onClick={()=>setOpen(o=>!o)}
        style={{...style, textAlign:'left', cursor:'pointer',
          color: value?'#fff':'#8a94a6', minHeight:38,
          display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <span>{dispText}</span>
        <span style={{fontSize:13,opacity:.7}}>📅</span>
      </button>
      {open&&(
        <>
          {/* 바깥 클릭 닫기 */}
          <div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:90}}/>
          <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:91,
            background:'#ffffff',border:'1.5px solid #dde8f5',borderRadius:14,
            padding:'12px 14px',boxShadow:'0 8px 32px rgba(30,50,90,0.15)',width:252}}>
            {/* 연/월 네비 */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <button type="button" onClick={prevMonth}
                style={{background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  width:28,height:28,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>‹</button>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <select value={viewY} onChange={e=>setViewY(+e.target.value)}
                  style={{background:'#ffffff',border:'1.5px solid #dde8f5',color:'#1a2236',
                    borderRadius:6,padding:'3px 6px',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>
                  {Array.from({length:80},(_, i)=>today.getFullYear()-70+i).map(y=>
                    <option key={y} value={y}>{y}년</option>)}
                </select>
                <select value={viewM} onChange={e=>setViewM(+e.target.value)}
                  style={{background:'#ffffff',border:'1.5px solid #dde8f5',color:'#1a2236',
                    borderRadius:6,padding:'3px 6px',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>
                  {MONTHS_KO.map((mn,i)=><option key={i} value={i}>{mn}</option>)}
                </select>
              </div>
              <button type="button" onClick={nextMonth}
                style={{background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  width:28,height:28,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>›</button>
            </div>
            {/* 요일 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
              {WEEK_KO.map((w,i)=>(
                <div key={w} style={{textAlign:'center',fontSize:10,fontWeight:700,
                  color:i===0?'#d04040':i===6?'#3060c0':'#6b7a8d',padding:'2px 0'}}>{w}</div>
              ))}
            </div>
            {/* 날짜 그리드 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
              {cells.map((d,i)=>(
                <div key={i} style={{aspectRatio:'1'}}>
                  {d&&(
                    <button type="button" onClick={()=>pick(viewY,viewM,d)}
                      style={{width:'100%',height:'100%',minHeight:28,border:'none',cursor:'pointer',
                        borderRadius:6,fontFamily:'inherit',fontSize:12,fontWeight:isSel(d)?800:500,
                        background:isSel(d)?'linear-gradient(135deg,#c9a84c,#a87028)':isToday(d)?'rgba(201,168,76,0.12)':'transparent',
                        color:isSel(d)?'#fff8ec':(i%7===0?'#d04040':i%7===6?'#3060c0':'#1a2236')}}>
                      {d}
                    </button>
                  )}
                </div>
              ))}
            </div>
            {/* 오늘 / 지우기 */}
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <button type="button" onClick={()=>{const t=new Date();pick(t.getFullYear(),t.getMonth(),t.getDate());}}
                style={{flex:1,background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  padding:'5px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>오늘</button>
              <button type="button" onClick={()=>{onChange({target:{value:''}});setOpen(false);}}
                style={{flex:1,background:'#dfe8f5',border:'none',color:'#8a94a6',borderRadius:6,
                  padding:'5px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>지우기</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ── 업종별 THRESH 매핑 포함 판정 함수 ── */
const IND_NAME={manu:'제조업',const:'건설업',retail:'도소매·음식',transport:'운수·창고',service:'서비스·사무'};
function statusOf(o, n, tog, industry){
  // 토글 체크
  if(o.tog){
    if(!tog[o.tog]) return{st:'na',reason:'해당 근로자가 없으면 적용되지 않습니다'};
    return o.req?{st:'cond'}:{st:'apply'};
  }
  // 업종 한정 체크 (ind 배열이 있으면 해당 업종만)
  if(o.ind && industry && !o.ind.includes(industry)){
    const indNames=o.ind.map(i=>IND_NAME[i]||i);
    return{st:'na',reason:indNames.join('·')+' 업종에만 해당'};
  }
  // 상한 인원기준 — 업종별(indScopeMax) 우선, 없으면 공통(scopeMax)
  // 이 인원 이상이면 적용 제외 (예: 안전관리자 선임의무 발생 구간)
  let maxKey = null;
  if(o.indScopeMax && industry && o.indScopeMax[industry]) maxKey = o.indScopeMax[industry];
  else if(o.scopeMax) maxKey = o.scopeMax;
  if(maxKey && THRESH[maxKey]!==undefined && n>=THRESH[maxKey]){
    const indTxt = (o.indScopeMax && industry) ? '('+(IND_NAME[industry]||industry)+') ' : '';
    return{st:'na',reason:'상시 '+THRESH[maxKey]+'인 이상 '+indTxt+'사업장은 적용 제외'+(o.scopeMaxReason?' ('+o.scopeMaxReason+')':'')};
  }
  // 업종별 별도 하한 인원기준 (indScope)
  if(o.indScope && industry){
    const scopeKey = o.indScope[industry] || o.scope;
    const thr = THRESH[scopeKey];
    if(thr !== undefined){
      if(n >= thr) return o.req?{st:'cond'}:{st:'apply'};
      return{st:'na',reason:'상시 '+thr+'인 미만('+(IND_NAME[industry]||industry)+') 사업장은 적용 제외'};
    }
  }
  // 일반 인원기준 (하한)
  if(THRESH[o.scope]!==undefined){
    const thr=THRESH[o.scope];
    if(n>=thr) return o.req?{st:'cond'}:{st:'apply'};
    return{st:'na',reason:'상시 '+thr+'인 미만 사업장은 적용 제외'};
  }
  return o.req?{st:'cond'}:{st:'apply'};
}

/* ═══════════════════════════════════════
   퇴직금 계산기 (근퇴법 §8, 근기법 §2)
═══════════════════════════════════════ */
function RetirementScreen({onBack,lang,setLang}){
  const ko=lang==='ko';
  const won=n=>Math.round(n||0).toLocaleString();
  const [tab,setTab]=useState('avg'); // avg|std|db|dc
  // 공통: 근속기간
  const [startDate,setStartDate]=useState('');
  const [endDate,setEndDate]=useState('');
  const [lastDayMode,setLastDayMode]=useState(false);
  // 평균임금 탭
  const [m1,setM1]=useState('');  // 퇴직전 3개월 각 임금
  const [m2,setM2]=useState('');
  const [m3,setM3]=useState('');
  const [d1,setD1]=useState('31'); // 각 달 일수
  const [d2s,setD2s]=useState('30');
  const [d3s,setD3s]=useState('31');
  const [bonus,setBonus]=useState(''); // 연간 상여금 총액
  const [leavePay,setLeavePay]=useState(''); // 연간 연차수당
  // 통상임금 탭
  const [monthlyStd,setMonthlyStd]=useState('');  // 월 통상임금
  // DC형
  const [annualWage,setAnnualWage]=useState('');   // 연간 임금총액
  const [returnRate,setReturnRate]=useState('3.0'); // 예상 운용수익률

  // 근속 계산
  const tenure = useMemo(()=>{
    if(!startDate||!endDate) return null;
    const s=new Date(startDate);
    const rawE=new Date(endDate);
    const e=lastDayMode?new Date(rawE.getTime()+86400000):rawE;
    if(e<=s) return null;
    const totalDays=Math.floor((e-s)/(1000*60*60*24));
    const years=totalDays/365.25;
    const y=Math.floor(years);
    const rem=totalDays-(y*365);
    const m=Math.floor(rem/30);
    const d=rem-(m*30);
    return{totalDays,years,y,m,d};
  },[startDate,endDate,lastDayMode]);

  const eligible = tenure && tenure.totalDays>=365; // 1년 이상

  // 평균임금 계산
  const avgResult = useMemo(()=>{
    if(!tenure) return null;
    const wages=[parseFloat(m1)||0,parseFloat(m2)||0,parseFloat(m3)||0];
    const days3m=(parseFloat(d1)||31)+(parseFloat(d2s)||30)+(parseFloat(d3s)||31);
    const bonusAmt=parseFloat(bonus)||0;
    const leaveAmt=parseFloat(leavePay)||0;
    const total3m=wages.reduce((a,b)=>a+b,0)+(bonusAmt*3/12)+(leaveAmt*3/12);
    const avgDaily=days3m>0?total3m/days3m:0;
    const retirement=eligible?avgDaily*30*(tenure.totalDays/365):0;
    return{avgDaily,retirement,days3m,total3m};
  },[m1,m2,m3,d1,d2s,d3s,bonus,leavePay,tenure,eligible]);

  // 통상임금 계산
  const stdResult = useMemo(()=>{
    if(!tenure) return null;
    const mStd=parseFloat(monthlyStd)||0;
    const dailyStd=mStd*12/365;
    const retirement=eligible?dailyStd*30*(tenure.totalDays/365):0;
    return{dailyStd,retirement};
  },[monthlyStd,tenure,eligible]);

  // DB형: 평균임금 기준과 동일 (avgResult 재사용)
  // DC형 계산
  const dcResult = useMemo(()=>{
    if(!tenure) return null;
    const annual=parseFloat(annualWage)||0;
    const rate=(parseFloat(returnRate)||0)/100;
    const yearsFrac=tenure.totalDays/365.25;
    // DC형: 매년 '연간임금 ÷ 12'(= 한 달치 월급)를 적립
    const yearly=annual/12;          // 연간 납입액 (한 해 적립액)
    // 원금 합계 = 연간 납입액 × 근속연수
    const base=yearly*yearsFrac;
    // 연복리 운용 추정: 매년 yearly를 넣고 남은 기간만큼 복리
    let compound=0;
    const yrs=Math.floor(yearsFrac);
    for(let i=1;i<=yrs;i++){
      compound+=yearly*Math.pow(1+rate,yearsFrac-i);
    }
    if(yearsFrac>yrs){
      compound+=yearly*(yearsFrac-yrs); // 1년 미만 잔여기간(수익 미적용 보수적)
    }
    return{base,compound,annualInput:yearly,yearsFrac};
  },[annualWage,returnRate,tenure]);

  const TABS=[
    {id:'avg',label:'평균임금',sub:'법정 기준'},
    {id:'std',label:'통상임금',sub:'비교 검토'},
    {id:'db', label:'DB형',   sub:'확정급여형'},
    {id:'dc', label:'DC형',   sub:'확정기여형'},
  ];

  return(
    <div style={{background:'#f6f9fd',minHeight:'100vh',
      fontFamily:"-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif",maxWidth:520,margin:'0 auto'}}>
      <SubHdr title="🏦 퇴직금 계산기" back={onBack}
        lang={lang} setLang={setLang}/>

      <div style={{padding:'14px 16px 80px'}}>

        {/* 탭 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:5,marginBottom:16}}>

              style={{padding:'9px 4px',borderRadius:11,border:'none',fontFamily:'inherit',
                cursor:'pointer',textAlign:'center',
                background:tab===t.id?'linear-gradient(160deg,#d4a83c,#b8922a)':'#ffffff',
                color:tab===t.id?'#fff8ec':'#6b7a8d',
                boxShadow:tab===t.id?'0 3px 14px rgba(184,146,42,0.35)':'0 1px 4px rgba(30,50,90,0.06)',
                border:tab===t.id?'none':'1.5px solid #dde8f5'}}>
              <div style={{fontSize:12,fontWeight:800}}>{t.label}</div>
              <div style={{fontSize:9,opacity:.75}}>{t.sub}</div>
            </button>
          ))}
        </div>

        {/* ── 공통: 근속기간 ── */}
        <div style={{background:"#ffffff",border:"1.5px solid #dde8f5",borderRadius:14,padding:'15px',marginBottom:14,boxShadow:"0 2px 10px rgba(30,50,90,0.05)"}}>
          <div style={{fontSize:12,fontWeight:800,color:"#b8922a",marginBottom:8,letterSpacing:"0.2px"}}>📅 근속기간 (공통)</div>
          <div style={{background:'rgba(201,168,76,0.07)',border:'1px solid rgba(201,168,76,0.25)',
            borderRadius:8,padding:'9px 11px',marginBottom:10,fontSize:11,color:C.txt2,lineHeight:1.7}}>
            <b style={{color:C.goldL}}>퇴직일 = 마지막 근무일의 다음 날</b><br/>
            예) 12월 31일이 마지막 출근일 → 퇴직일은 <b style={{color:"#1a2236"}}>다음해 1월 1일</b><br/>
            근기법상 퇴직일 = 근로관계가 실제로 끝나는 날(마지막 근무일+1일)
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <button onClick={()=>setLastDayMode(p=>!p)}
              style={{background:lastDayMode?"linear-gradient(135deg,#d4a83c,#b8922a)":"#f4f8fd",
                border:`1.5px solid ${lastDayMode?"#c9a030":"#dde8f5"}`,
                color:lastDayMode?"#fff8ec":"#6b7a8d",
                boxShadow:lastDayMode?"0 2px 8px rgba(184,146,42,0.3)":"none",
                borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:700,
                cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>
              {lastDayMode?'ON: 마지막 근무일 입력':'OFF: 퇴직일 직접 입력'}
            </button>
            <span style={{fontSize:10,color:C.txt3,lineHeight:1.5}}>
              {lastDayMode?'입력한 날 자동 +1일 = 퇴직일':'퇴직일(마지막근무일+1)을 직접 입력'}
            </span>
          </div>
          <div style={R2}>
            <RetFieldRow label="입사일 *">
              <DateInput style={INP} value={startDate} onChange={e=>setStartDate(e.target.value)} label="입사일 선택"/>
            </RetFieldRow>
            <RetFieldRow label={lastDayMode?"마지막 근무일 *":"퇴직일 * (마지막 근무일의 다음날)"}>
              <DateInput style={INP} value={endDate} onChange={e=>setEndDate(e.target.value)} label={lastDayMode?"마지막 근무일 선택":"퇴직일 선택"}/>
            </RetFieldRow>
          </div>
          {tenure&&(
            <div style={{marginTop:8,padding:'10px 13px',
              background:"linear-gradient(135deg,rgba(184,146,42,0.06),rgba(184,146,42,0.03))",
              border:"1px solid rgba(184,146,42,0.15)",borderRadius:10,
              fontSize:12,color:"#3a4a5c",lineHeight:1.9}}>
              <span style={{fontWeight:800,color:"#b8922a"}}>
                {tenure.y}년 {tenure.m}개월 {tenure.d}일
              </span>
              <span style={{color:C.txt3,marginLeft:8}}>({tenure.totalDays.toLocaleString()}일)</span>
              {!eligible&&(
                <div style={{color:C.red,fontSize:11,marginTop:3}}>
                  ⚠ 계속근로 1년 미만 — 법정 퇴직금 발생하지 않습니다
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── 평균임금 탭 ── */}
        {tab==='avg'&&(
          <div>
            <RetInfoBox text={
              `📌 평균임금 = (퇴직 전 3개월 임금 + 연간상여금×3/12 + 연차수당×3/12) ÷ 3개월 총일수\n` +
              `퇴직금 = 1일 평균임금 × 30일 × 근속일수÷365 (근기법 §2, 근퇴법 §8)`
            }/>
            <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,padding:14}}>

              <div style={R2}>

                <RetFieldRow label="연간 연차수당(원)">
                  <MoneyInput style={INP} placeholder="0" value={leavePay} onChange={nv=>setLeavePay(nv)}/>
                </RetFieldRow>
              </div>
            </div>
            {avgResult&&avgResult.avgDaily>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>3개월 임금합계</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(avgResult.total3m)}원</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>3개월 총일수</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{avgResult.days3m}일</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>1일 평균임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.goldL}}>{won(avgResult.avgDaily)}원</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>30일분 평균임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(avgResult.avgDaily*30)}원</div>
                  </div>
                </div>
                {eligible
                  ?<RetResultBox label="예상 퇴직금 (평균임금 기준)" amount={avgResult.retirement}
                      sub={`1일 평균임금 ${won(avgResult.avgDaily)}원 × 30일 × ${(tenure.totalDays/365).toFixed(4)}년`}/>
                  :<div style={{marginTop:12,padding:'12px',background:'rgba(217,80,80,0.08)',
                    border:'1px solid rgba(217,80,80,0.3)',borderRadius:12,fontSize:12,color:C.red,textAlign:'center'}}>
                    계속근로 1년 이상이어야 퇴직금이 발생합니다
                  </div>
                }
              </div>
            )}
          </div>
        )}

        {/* ── 통상임금 탭 ── */}
        {tab==='std'&&(
          <div>
            <RetInfoBox text={
              `📌 통상임금 = 기본급 + 정기·일률·고정적으로 지급되는 수당의 합계\n` +
              `1일 통상임금 = 월 통상임금 × 12 ÷ 365\n` +
              `평균임금 < 통상임금이면 통상임금으로 퇴직금 계산 (근기법 §2②)\n` +
              `→ 평균임금 탭과 비교 후 높은 금액 적용`
            }/>
            <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,padding:14}}>
              <div style={{fontSize:12,fontWeight:800,color:C.goldL,marginBottom:10}}>월 통상임금</div>
              <RetFieldRow label="기본급 (원)">
                <MoneyInput style={INP} placeholder="기본급" value={monthlyStd} onChange={nv=>setMonthlyStd(nv)}/>
              </RetFieldRow>
              <div style={{fontSize:11,color:C.txt3,marginTop:4,lineHeight:1.6}}>
                ※ 식대·교통비 등 고정 지급 수당은 기본급에 합산하여 입력하세요<br/>
                ※ 초과근무수당·상여금(비고정)은 제외
              </div>
            </div>
            {stdResult&&stdResult.dailyStd>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:4}}>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>1일 통상임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.goldL}}>{won(stdResult.dailyStd)}원</div>
                    <div style={{fontSize:9,color:C.txt3}}>월통상임금×12÷365</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>30일분 통상임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(stdResult.dailyStd*30)}원</div>
                  </div>
                </div>
                {eligible
                  ?<RetResultBox label="예상 퇴직금 (통상임금 기준)" amount={stdResult.retirement}
                      sub={`1일 통상임금 ${won(stdResult.dailyStd)}원 × 30일 × ${(tenure.totalDays/365).toFixed(4)}년`}/>
                  :<div style={{marginTop:12,padding:'12px',background:'rgba(217,80,80,0.08)',
                    border:'1px solid rgba(217,80,80,0.3)',borderRadius:12,fontSize:12,color:C.red,textAlign:'center'}}>
                    계속근로 1년 이상이어야 퇴직금이 발생합니다
                  </div>
                }
                {stdResult&&avgResult?.avgDaily>0&&eligible&&(
                  <div style={{marginTop:8,padding:'10px 12px',borderRadius:10,fontSize:12,
                    background: stdResult.retirement>avgResult.retirement
                      ?'rgba(58,184,122,0.08)':'rgba(201,168,76,0.06)',
                    border:`1px solid ${stdResult.retirement>avgResult.retirement?'rgba(58,184,122,0.3)':'rgba(201,168,76,0.2)'}`}}>
                    <span style={{fontWeight:700,
                      color:stdResult.retirement>avgResult.retirement?C.green:C.gold}}>
                      {stdResult.retirement>avgResult.retirement
                        ?'✓ 통상임금 기준이 더 높음 → 통상임금 적용'
                        :'평균임금 기준이 더 높음 → 평균임금 탭 값 적용'}
                    </span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── DB형 탭 ── */}
        {tab==='db'&&(
          <div>
            <RetInfoBox text={
              `📌 DB형(확정급여형) 퇴직연금 (근퇴법 §15)\n` +
              `급여 = 퇴직 직전 3개월 평균임금 × 30일 × 근속연수\n` +
              `계산 방식은 법정퇴직금과 동일 — 차이점:\n` +
              `· 사용자가 외부 금융기관에 적립·운용\n` +
              `· 중간정산 원칙 불가 (사유 있을 때 예외)\n` +
              `· 운용 손실은 사용자가 부담\n` +
              `→ 평균임금 탭에서 계산한 값이 DB형 예상 급여와 동일합니다`
            }/>
            {avgResult?.retirement>0&&eligible
              ?<RetResultBox label="DB형 퇴직연금 예상 급여 (= 법정퇴직금)" amount={avgResult.retirement}
                  sub="퇴직 직전 3개월 평균임금 기준 · 평균임금 탭에서 임금을 입력하세요"/>
              :<div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,
                padding:'20px',textAlign:'center',color:C.txt3,fontSize:13}}>
                평균임금 탭에서 퇴직 전 3개월 임금을 먼저 입력하면<br/>
                DB형 예상 급여가 여기에 표시됩니다
              </div>
            }
            <div style={{marginTop:14,background:'rgba(139,110,224,0.07)',
              border:'1px solid rgba(139,110,224,0.2)',borderRadius:10,padding:'12px',fontSize:11,
              color:C.txt2,lineHeight:1.8}}>
              <b style={{color:C.purple}}>DB vs DC 선택 기준</b><br/>
              <b>DB유리:</b> 임금이 꾸준히 오르는 경우, 장기근속 예정<br/>
              <b>DC유리:</b> 임금 변동 적거나, 본인이 직접 운용하고 싶을 때<br/>
              근퇴법 §13에 따라 근로자가 선택하거나 사용자가 설정
            </div>
          </div>
        )}

        {/* ── DC형 탭 ── */}
        {tab==='dc'&&(
          <div>
            <RetInfoBox text={
              `📌 DC형(확정기여형) 퇴직연금 (근퇴법 §20)\n` +
              `사용자가 매년 '연간 임금총액의 1/12'(= 한 달치 월급)을 근로자 계좌에 적립\n` +
              `예) 월급 280만원 → 연간임금 3,360만원 → 매년 280만원씩 적립\n` +
              `근로자가 직접 운용 → 최종 수령액은 운용수익에 따라 달라짐`
            }/>
            <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,padding:14}}>
              <div style={{fontSize:12,fontWeight:800,color:C.goldL,marginBottom:10}}>DC형 입력</div>
              <RetFieldRow label="연간 임금총액 (원) = 월급 × 12개월">
                <MoneyInput style={INP} placeholder="예) 33,600,000 (월 280만×12)" value={annualWage} onChange={nv=>setAnnualWage(nv)}/>

              <RetFieldRow label="예상 연 운용수익률 (%)">

            </div>
            {dcResult&&dcResult.annualInput>0&&(

                <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,
                  padding:'12px 14px',marginBottom:8}}>
                  <div style={{fontSize:11,color:C.txt3,marginBottom:2}}>매년 적립액 (연간 임금총액 ÷ 12)</div>
                  <div style={{fontSize:16,fontWeight:800,color:C.goldL}}>{won(dcResult.annualInput)}원/년</div>

                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>

                    <div style={{fontSize:13,fontWeight:700,color:C.green}}>{won(dcResult.compound)}원</div>
                    <div style={{fontSize:9,color:C.txt3}}>연복리 {returnRate}% 가정</div>

// 🔒 비밀번호 잠금 화면
// ────────────────────────────────────────
const CORRECT_PW = "1350"; // ← 비밀번호를 여기서 변경하세요

function LockScreen({ onUnlock }) {
  const [pw, setPw] = React.useState("");
  const [error, setError] = React.useState(false);
  const [shake, setShake] = React.useState(false);

  const tryUnlock = () => {
    if (pw === CORRECT_PW) {
      onUnlock();
    } else {
      setError(true);
      setShake(true);
      setPw("");
      setTimeout(() => setShake(false), 500);
    }
  };

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      background:"linear-gradient(160deg,#f6f9fd 0%,#edf2fb 100%)",
      padding:"24px"
    }}>
      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)}
          40%{transform:translateX(8px)}
          60%{transform:translateX(-6px)}
          80%{transform:translateX(6px)}
        }
        .shake { animation: shake 0.45s ease; }
        .lock-input:focus { outline:none; border-color:#b8922a !important; box-shadow: 0 0 0 3px rgba(184,146,42,0.15) !important; }
      `}</style>

      {/* 로고 */}
      <div style={{marginBottom:8}}>
        <img src="icon-192.png" alt="노무길잡이" style={{width:80,height:80,borderRadius:"50%",boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}} />
      </div>
      <div style={{fontSize:20,fontWeight:900,color:"#1a2236",marginBottom:4,letterSpacing:"-0.5px"}}>
        노무길잡이
      </div>
      <div style={{fontSize:13,color:"#8a96a8",marginBottom:32}}>
        대구지방고용노동청
      </div>

      {/* 잠금 카드 */}
      <div className={shake ? "shake" : ""} style={{
        background:"#fff", borderRadius:20, padding:"28px 28px 24px",
        width:"100%", maxWidth:320,
        boxShadow:"0 8px 32px rgba(30,50,90,0.10)",
        border:"1.5px solid #e8edf6"
      }}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:28,marginBottom:8}}>🔒</div>
          <div style={{fontSize:15,fontWeight:800,color:"#1a2236"}}>비밀번호를 입력하세요</div>
        </div>

        <input
          className="lock-input"
          type="password"
          value={pw}
          onChange={e=>{ setPw(e.target.value); setError(false); }}
          onKeyDown={e=>{ if(e.key==="Enter") tryUnlock(); }}
          placeholder="비밀번호"
          autoFocus
          style={{
            width:"100%", padding:"13px 16px",
            fontSize:16, fontWeight:700, letterSpacing:4,
            border:`1.5px solid ${error?"#e05050":"#dde8f5"}`,
            borderRadius:12, background: error?"#fff8f8":"#f8faff",
            color:"#1a2236", textAlign:"center",
            fontFamily:"inherit", marginBottom:8,
            transition:"all 0.2s"
          }}
        />

        {error && (
          <div style={{
            textAlign:"center", fontSize:12, color:"#e05050",
            fontWeight:700, marginBottom:10
          }}>
            ❌ 비밀번호가 틀렸습니다
          </div>
        )}

        <button
          onClick={tryUnlock}
          style={{
            width:"100%", padding:"13px",
            background:"linear-gradient(135deg,#c9a030,#9a7520)",
            color:"#fff", border:"none", borderRadius:12,
            fontSize:15, fontWeight:800, cursor:"pointer",
            fontFamily:"inherit", marginTop: error ? 0 : 4,
            boxShadow:"0 3px 12px rgba(184,146,42,0.30)"
          }}
        >
          입장하기
        </button>
      </div>

      <div style={{marginTop:20,fontSize:11,color:"#b0bac8"}}>
        문의: 고용노동부 ☎ 1350
      </div>
    </div>
  );
}

function AppWithLock() {
  const [unlocked, setUnlocked] = React.useState(false);
  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;
  return <App />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppWithLock />);
</script>

<!-- PWA Service Worker 등록 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 새 버전 감지 → 자동 업데이트 배너
            const banner = document.getElementById('update-banner');
            if (banner) banner.style.display = 'flex';
          }
        });
      });
    } catch(e) {
      console.log('SW 등록 실패:', e);
    }
  });
}
</script>
