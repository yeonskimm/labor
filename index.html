/* ============================================================

   LOCAL_MODE = true  : 회원가입·서버 없이 전체 기능 사용 (현재 설정)

   LOCAL_MODE = false : 기존 Supabase 회원가입 방식으로 복귀

/* ── localStorage 기반 Supabase 호환 어댑터 ──
   앱에서 실제 사용하는 쿼리 표면만 구현:
   from().select().eq()...order()/.single() / insert().select().single()
   update().eq() / delete().eq() / upsert(,{onConflict}) / auth / channel  */
function makeLocalDB(){
  const K = t => 'ngdb_' + t;
  const read = t => { try { return JSON.parse(localStorage.getItem(K(t)) || '[]'); } catch(_) { return []; } };
  const write = (t, rows) => {
    try { localStorage.setItem(K(t), JSON.stringify(rows)); }
    catch(_) { alert('기기 저장 공간이 가득 찼습니다. 오래된 기록을 정리한 뒤 다시 시도해주세요.'); }
  };
  const uid = () => (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : ('L' + Date.now().toString(36) + Math.random().toString(36).slice(2, 9));
  const curUid = () => {
    try { return localStorage.getItem('ng_role') === 'worker' ? 'local-worker' : 'local-owner'; }
    catch(_) { return 'local-owner'; }
  };
  const same = (a, b) => {
    if (a === b) return true;
    if (a == null || b == null) return a == null && b == null;
    return String(a) === String(b);
  };
  const hit = (row, fs) => fs.every(([k, v]) => same(row[k], v));

  const from = (table) => {
    const st = { op:'select', sel:'*', filters:[], orderBy:null, one:false, ret:false, payload:null, conflict:null };
    const run = () => {
      let rows = read(table);
      if (st.op === 'insert' || st.op === 'upsert') {
        const list = Array.isArray(st.payload) ? st.payload : [st.payload];
        const out = [];
        list.forEach(p => {
          const row = { ...p };
          if (row.id == null || row.id === '') row.id = uid();
          if (row.created_at === undefined) row.created_at = new Date().toISOString();
          if (table === 'personal_records' && row.user_id === undefined) row.user_id = curUid();
          if (st.op === 'upsert' && st.conflict) {
            const keys = st.conflict.split(',').map(s => s.trim());
            const i = rows.findIndex(r => keys.every(k => same(r[k], row[k])));
            if (i >= 0) { rows[i] = { ...rows[i], ...p }; out.push(rows[i]); return; }
          }
          rows.push(row); out.push(row);
        });
        write(table, rows);
        return { data: st.one ? (out[0] || null) : (st.ret ? out : null), error: null };
      }
      if (st.op === 'update') {
        rows = rows.map(r => hit(r, st.filters) ? { ...r, ...st.payload } : r);
        write(table, rows); return { data: null, error: null };
      }
      if (st.op === 'delete') {
        write(table, rows.filter(r => !hit(r, st.filters)));
        return { data: null, error: null };
      }
      let data = rows.filter(r => hit(r, st.filters));
      if (/workplaces\s*\(/.test(st.sel)) {
        const wps = read('workplaces');
        data = data.map(r => ({ ...r, workplaces: wps.find(w => same(w.id, r.workplace_id)) || null }));
      }
      if (st.orderBy) {
        const [k, asc] = st.orderBy;
        data = [...data].sort((a, b) => a[k] === b[k] ? 0 : ((a[k] > b[k] ? 1 : -1) * (asc ? 1 : -1)));
      }
      if (st.one) {
        return data[0] ? { data: data[0], error: null }
                       : { data: null, error: { message: '0 rows', code: 'PGRST116' } };
      }
      return { data, error: null };
    };
    const b = {
      select(s) { if (st.op === 'select') { if (s) st.sel = s; } else st.ret = true; return b; },
      insert(p) { st.op = 'insert'; st.payload = p; return b; },
      update(p) { st.op = 'update'; st.payload = p; return b; },
      upsert(p, opt) { st.op = 'upsert'; st.payload = p; st.conflict = (opt && opt.onConflict) || null; return b; },
      delete() { st.op = 'delete'; return b; },
      eq(k, v) { st.filters.push([k, v]); return b; },
      order(k, o) { st.orderBy = [k, !(o && o.ascending === false)]; return b; },
      single() { st.one = true; return b; },
      maybeSingle() { st.one = true; return b; },
      limit() { return b; },
      then(res, rej) { return Promise.resolve().then(run).then(res, rej); },
    };
    return b;
  };

  const ch = { on() { return ch; }, subscribe() { return ch; }, unsubscribe() {} };
  return {
    from,
    channel: () => ch,
    removeChannel: () => {},
    auth: {
      getSession: () => Promise.resolve({ data: { session: null } }),
      onAuthStateChange: () => ({ data: { subscription: { unsubscribe() {} } } }),
      signOut: () => { try { localStorage.removeItem('ng_role'); } catch(_) {} return Promise.resolve({ error: null }); },
      signInWithOAuth: () => Promise.resolve({ error: { message: '무가입 모드에서는 로그인 기능이 꺼져 있습니다.' } }),
      signUp: () => Promise.resolve({ data: null, error: { message: '무가입 모드' } }),
      signInWithPassword: () => Promise.resolve({ data: null, error: { message: '무가입 모드' } }),
    },
  };
}

let sb;
if (LOCAL_MODE) {

} else {

  catch(e) { console.error('Supabase init failed:', e); sb = { auth: { getSession:()=>Promise.resolve({data:{session:null}}), onAuthStateChange:(_,cb)=>{cb(null,null);return {data:{subscription:{unsubscribe:()=>{}}}}}, signOut:()=>Promise.resolve(), signInWithPassword:()=>Promise.reject(e) }, from:()=>({select:()=>Promise.reject(e),insert:()=>Promise.reject(e),update:()=>Promise.reject(e),delete:()=>Promise.reject(e),upsert:()=>Promise.reject(e)}) }; }
}

function legalBreakH(h) {
  if (h >= 8) return 1;
  if (h >= 4) return 0.5;
  return 0;
}
function calcDayHours(r) {
  if (!r.in_time || !r.out_time) return 0;
  const [ih,im] = r.in_time.split(':').map(Number);
  const [oh,om] = r.out_time.split(':').map(Number);
  const raw = (oh+om/60)-(ih+im/60);
  if (raw <= 0) return 0;
  const brk = (r.break_h !== undefined && r.break_h !== null && r.break_h !== '')
    ? Number(r.break_h) : legalBreakH(raw);
  return Math.max(0, r.break_paid ? raw : raw - brk);
}
function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

const MIN_WAGE = 10320;
const DAYS = ["월","화","수","목","금","토","일"];
const toMin = t => { if(!t) return null; const[h,m]=t.split(":").map(Number); return h*60+(m||0); };
const resolveEnd = (inM, outM) => (outM !== null && outM <= inM) ? outM+1440 : outM;
const won = n => Math.round(n).toLocaleString("ko-KR");
const fmtH = m => { const h=Math.floor(m/60),mn=m%60; return mn?`${h}시간 ${mn}분`:`${h}시간`; };
const d2 = t => t ? t.replace(/-/g,".") : "　　　　";
const fill = (v,f="　　　　　") => v||f;

function nightMin(s,e){ let n=0; for(let m=s;m<e;m++){const h=m%1440;if(h>=1320||h<360)n++;} return n; }
const minToTime = m => { const mm=((m%1440)+1440)%1440; const h=Math.floor(mm/60),mn=mm%60; return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; };

// 시간(숫자)만 입력하는 간편 모드 - 야간 없이 소정/연장만 분리
function calcDaySimple(totalH, sojeongH, hourly, breakH=0, breakPaid=false){
  if(!totalH||totalH<=0) return null;
  // 무급 휴게는 실질 근무시간에서 차감
  const netH = breakPaid ? totalH : Math.max(0, totalH - breakH);
  const sojH=Math.min(netH,sojeongH);
  const otH=Math.max(0,netH-sojeongH);
  return {sojeongMin:sojH*60, otMin:otH*60, nightMin:0,
    sojPay:sojH*hourly, otPay:otH*hourly*1.5,
    totalPay:sojH*hourly+otH*hourly*1.5, simpleMode:true,
    breakH, breakPaid};
}

// 소정시간(시간 수)으로 자동 계산하는 버전
function calcDayH(inT, sojeongH, actT, hourly, is5plus, breakH=0, breakPaid=false){
  const inM=toMin(inT); if(inM===null) return null;
  const sojM=inM+sojeongH*60;
  const actRaw=toMin(actT);
  let rawActM=actRaw!==null?Math.max(sojM,resolveEnd(inM,actRaw)):sojM;
  // 무급 휴게: 실질 종료시간 앞당김
  const effActM = rawActM - (breakPaid ? 0 : breakH*60);
  const effSojM = Math.min(sojM, effActM);
  const soj=calcSeg(inM,effSojM,hourly,1.0,is5plus);
  const ot=effActM>effSojM?calcSeg(effSojM,effActM,hourly,1.5,is5plus):{min:0,nightMin:0,pay:0};
  return {sojeongMin:soj.min,otMin:ot.min,nightMin:soj.nightMin+ot.nightMin,
    totalPay:soj.pay+ot.pay,sojPay:soj.pay,otPay:ot.pay,sojEndMin:sojM,
    breakH, breakPaid};
}

function calcSeg(inAbs,outAbs,hourly,rate,is5plus){
  if(!inAbs||!outAbs||outAbs<=inAbs) return {min:0,nightMin:0,pay:0};
  const min=outAbs-inAbs;
  const nMin=is5plus?nightMin(inAbs,outAbs):0;
  const dMin=min-nMin;
  return {min, nightMin:nMin, pay:(dMin/60)*hourly*rate+(nMin/60)*hourly*(rate+0.5)};
}

function calcDay(inT,sojT,actT,hourly,is5plus){
  const inM=toMin(inT); if(inM===null) return null;
  const sojRaw=toMin(sojT); if(sojRaw===null) return null;
  const sojM=resolveEnd(inM,sojRaw);
  const actRaw=toMin(actT||sojT);
  const actM=Math.max(sojM, resolveEnd(inM,actRaw));
  const soj=calcSeg(inM,sojM,hourly,1.0,is5plus);
  const ot =actM>sojM?calcSeg(sojM,actM,hourly,1.5,is5plus):{min:0,nightMin:0,pay:0};
  return {sojeongMin:soj.min, otMin:ot.min, nightMin:soj.nightMin+ot.nightMin,
    totalPay:soj.pay+ot.pay, sojPay:soj.pay, otPay:ot.pay};
}

function calcWeek(schedule,hourly,is5plus,sojeongH=8){
  let sojMin=0,otMin=0,totalPay=0,nightTotal=0;
  const days={};
  DAYS.forEach(d=>{
    const s=schedule[d];
    if(!s) return;
    let r=null;
    if(s.inputMode==="hours"){
      // 시간입력은 이미 휴게를 제외한 실근로시간이므로 휴게 차감 안 함
      r = s.hours>0 ? calcDaySimple(s.hours,sojeongH,hourly,0,false) : null;
    } else {
      r = s.in ? calcDayH(s.in,sojeongH,s.out,hourly,is5plus,s.breakH||0,s.breakPaid||false) : null;
    }
    if(!r) return;
    days[d]=r; sojMin+=r.sojeongMin; otMin+=r.otMin;
    totalPay+=r.totalPay; nightTotal+=r.nightMin;
  });
  const hasJuhyu=sojMin>=15*60;
  const juhyuH=hasJuhyu?Math.min((sojMin/60)/40*8,8):0;
  const juhyuPay=juhyuH*hourly;
  return {days,sojMin,otMin,totalPay,nightTotal,hasJuhyu,juhyuH,juhyuPay,
    needMore:Math.max(0,15*60-sojMin),
    weekTotal:totalPay+juhyuPay, monthEst:(totalPay+juhyuPay)*4.345};
}

function isoWeekKey(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const day=(d.getDay()+6)%7;
  d.setDate(d.getDate()-day+3);
  const firstThu=new Date(d.getFullYear(),0,4);
  const week=1+Math.round(((d-firstThu)/86400000-3+((firstThu.getDay()+6)%7))/7);
  return d.getFullYear()+"-W"+pad2(week);
}
// 출퇴근 기록 전용: 실제 근무시간 그대로 반영 (소정은 연장 분리 기준으로만 사용)
function calcAttend(inT,outT,sojeongH,hourly,is5plus,breakH=0,breakPaid=false){
  const inM=toMin(inT); const outRaw=toMin(outT);
  if(inM===null||outRaw===null) return null;
  // 출근=퇴근(같은 시각)은 0분으로 처리. 퇴근<출근일 때만 야간(다음날)로 간주
  let outM = outRaw===inM ? inM : resolveEnd(inM,outRaw);
  const effOut=outM-(breakPaid?0:breakH*60);
  if(effOut<=inM) return {sojeongMin:0,otMin:0,nightMin:0,totalPay:0,zero:true};
  const sojBoundary=Math.min(inM+sojeongH*60, effOut);
  const soj=calcSeg(inM,sojBoundary,hourly,1.0,is5plus);
  const ot=effOut>sojBoundary?calcSeg(sojBoundary,effOut,hourly,1.5,is5plus):{min:0,nightMin:0,pay:0};
  return {sojeongMin:soj.min,otMin:ot.min,nightMin:soj.nightMin+ot.nightMin,
    totalPay:soj.pay+ot.pay};
}

/* ═══════════════════════════════════════
   A4 스케일 래퍼 (모바일 대응)
const A4=794;
function ScaledPreview({children,pRef}){
  const wRef=useRef(null);
  const[scale,setScale]=useState(1);
  const obs=useRef(null);
  const setW=()=>{ if(wRef.current){ const w=wRef.current.offsetWidth; setScale(Math.min(1,(w-16)/A4)); }};
  useState(()=>{ setTimeout(setW,0); });
  useMemo(()=>{ obs.current=new ResizeObserver(setW); return()=>obs.current?.disconnect(); },[]);
  useMemo(()=>{ if(wRef.current&&obs.current) obs.current.observe(wRef.current); },[]);
  const scaledH=A4*1.414*scale;
  return(
    <div ref={wRef} style={{width:"100%",overflow:"hidden"}}>
      <div style={{width:A4,transformOrigin:"top left",transform:`scale(${scale})`,
        height:A4*1.414,marginBottom:scaledH-A4*1.414}}>
        <div ref={pRef}>{children}</div>
      </div>
    </div>
  );
}

// ── 커스텀 날짜 선택기 (달력에서 날짜 누르면 즉시 선택) ──
const MONTHS_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WEEK_KO=['일','월','화','수','목','금','토'];
function DateInput({style, value, onChange, label}){
  const [open,setOpen]=useState(false);
  const today=new Date();
  const sel = value?new Date(value+'T00:00:00'):null;
  const [viewY,setViewY]=useState((sel||today).getFullYear());
  const [viewM,setViewM]=useState((sel||today).getMonth());

  const pick=(y,m,d)=>{
    const mm=String(m+1).padStart(2,'0');
    const dd=String(d).padStart(2,'0');
    onChange({target:{value:`${y}-${mm}-${dd}`}});
    setOpen(false);
  };

  // 달력 그리드 계산
  const firstDay=new Date(viewY,viewM,1).getDay();
  const daysInMonth=new Date(viewY,viewM+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const isSel=(d)=>sel&&sel.getFullYear()===viewY&&sel.getMonth()===viewM&&sel.getDate()===d;
  const isToday=(d)=>today.getFullYear()===viewY&&today.getMonth()===viewM&&today.getDate()===d;

  const prevMonth=()=>{ if(viewM===0){setViewM(11);setViewY(y=>y-1);}else setViewM(m=>m-1); };
  const nextMonth=()=>{ if(viewM===11){setViewM(0);setViewY(y=>y+1);}else setViewM(m=>m+1); };

  const dispText = value ? `${sel.getFullYear()}. ${sel.getMonth()+1}. ${sel.getDate()}` : (label||'날짜 선택');

  return(
    <div style={{position:'relative'}}>
      {/* 표시 버튼 */}
      <button type="button" onClick={()=>setOpen(o=>!o)}
        style={{...style, textAlign:'left', cursor:'pointer',
          color: value?'#fff':'#8a94a6', minHeight:38,
          display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <span>{dispText}</span>
        <span style={{fontSize:13,opacity:.7}}>📅</span>
      </button>
      {open&&(
        <>
          {/* 바깥 클릭 닫기 */}
          <div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:90}}/>
          <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:91,
            background:'#ffffff',border:'1.5px solid #dde8f5',borderRadius:14,
            padding:'12px 14px',boxShadow:'0 8px 32px rgba(30,50,90,0.15)',width:252}}>
            {/* 연/월 네비 */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <button type="button" onClick={prevMonth}
                style={{background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  width:28,height:28,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>‹</button>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <select value={viewY} onChange={e=>setViewY(+e.target.value)}
                  style={{background:'#ffffff',border:'1.5px solid #dde8f5',color:'#1a2236',
                    borderRadius:6,padding:'3px 6px',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>
                  {Array.from({length:80},(_, i)=>today.getFullYear()-70+i).map(y=>
                    <option key={y} value={y}>{y}년</option>)}
                </select>
                <select value={viewM} onChange={e=>setViewM(+e.target.value)}
                  style={{background:'#ffffff',border:'1.5px solid #dde8f5',color:'#1a2236',
                    borderRadius:6,padding:'3px 6px',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>
                  {MONTHS_KO.map((mn,i)=><option key={i} value={i}>{mn}</option>)}
                </select>
              </div>
              <button type="button" onClick={nextMonth}
                style={{background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  width:28,height:28,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>›</button>
            </div>
            {/* 요일 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
              {WEEK_KO.map((w,i)=>(
                <div key={w} style={{textAlign:'center',fontSize:10,fontWeight:700,
                  color:i===0?'#d04040':i===6?'#3060c0':'#6b7a8d',padding:'2px 0'}}>{w}</div>
              ))}
            </div>
            {/* 날짜 그리드 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
              {cells.map((d,i)=>(
                <div key={i} style={{aspectRatio:'1'}}>
                  {d&&(
                    <button type="button" onClick={()=>pick(viewY,viewM,d)}
                      style={{width:'100%',height:'100%',minHeight:28,border:'none',cursor:'pointer',
                        borderRadius:6,fontFamily:'inherit',fontSize:12,fontWeight:isSel(d)?800:500,
                        background:isSel(d)?'linear-gradient(135deg,#c9a84c,#a87028)':isToday(d)?'rgba(201,168,76,0.12)':'transparent',
                        color:isSel(d)?'#fff8ec':(i%7===0?'#d04040':i%7===6?'#3060c0':'#1a2236')}}>
                      {d}
                    </button>
                  )}
                </div>
              ))}
            </div>
            {/* 오늘 / 지우기 */}
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <button type="button" onClick={()=>{const t=new Date();pick(t.getFullYear(),t.getMonth(),t.getDate());}}
                style={{flex:1,background:'#dfe8f5',border:'none',color:'#c9a84c',borderRadius:6,
                  padding:'5px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>오늘</button>
              <button type="button" onClick={()=>{onChange({target:{value:''}});setOpen(false);}}
                style={{flex:1,background:'#dfe8f5',border:'none',color:'#8a94a6',borderRadius:6,
                  padding:'5px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>지우기</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

    <div style={{fontWeight:700,fontSize:12,color:C.goldL,margin:"10px 0 6px"}}>👪 친권자(후견인)</div>

      <FLD label="관계"><input style={INP} placeholder="예) 부, 모" value={f.guardianRel||""} onChange={e=>u("guardianRel",e.target.value)}/></FLD>

      <FLD label="가족관계증명서"><select style={SEL} value={f.consentReady||"no"} onChange={e=>u("consentReady",e.target.value)}>

      <FLD label="작성일"><DateInput style={INP} value={f.signDate||""} onChange={e=>u("signDate",e.target.value)} label="날짜 선택"/></FLD>
    </div>
  </>);
}

/* ── 업종별 THRESH 매핑 포함 판정 함수 ── */
const IND_NAME={manu:'제조업',const:'건설업',retail:'도소매·음식',transport:'운수·창고',service:'서비스·사무'};
function statusOf(o, n, tog, industry){
  // 토글 체크
  if(o.tog){
    if(!tog[o.tog]) return{st:'na',reason:'해당 근로자가 없으면 적용되지 않습니다'};
    return o.req?{st:'cond'}:{st:'apply'};
  }
  // 업종 한정 체크 (ind 배열이 있으면 해당 업종만)
  if(o.ind && industry && !o.ind.includes(industry)){
    const indNames=o.ind.map(i=>IND_NAME[i]||i);
    return{st:'na',reason:indNames.join('·')+' 업종에만 해당'};
  }
  // 상한 인원기준 — 업종별(indScopeMax) 우선, 없으면 공통(scopeMax)
  // 이 인원 이상이면 적용 제외 (예: 안전관리자 선임의무 발생 구간)
  let maxKey = null;
  if(o.indScopeMax && industry && o.indScopeMax[industry]) maxKey = o.indScopeMax[industry];
  else if(o.scopeMax) maxKey = o.scopeMax;
  if(maxKey && THRESH[maxKey]!==undefined && n>=THRESH[maxKey]){
    const indTxt = (o.indScopeMax && industry) ? '('+(IND_NAME[industry]||industry)+') ' : '';
    return{st:'na',reason:'상시 '+THRESH[maxKey]+'인 이상 '+indTxt+'사업장은 적용 제외'+(o.scopeMaxReason?' ('+o.scopeMaxReason+')':'')};
  }
  // 업종별 별도 하한 인원기준 (indScope)
  if(o.indScope && industry){
    const scopeKey = o.indScope[industry] || o.scope;
    const thr = THRESH[scopeKey];
    if(thr !== undefined){
      if(n >= thr) return o.req?{st:'cond'}:{st:'apply'};
      return{st:'na',reason:'상시 '+thr+'인 미만('+(IND_NAME[industry]||industry)+') 사업장은 적용 제외'};
    }
  }
  // 일반 인원기준 (하한)
  if(THRESH[o.scope]!==undefined){
    const thr=THRESH[o.scope];
    if(n>=thr) return o.req?{st:'cond'}:{st:'apply'};
    return{st:'na',reason:'상시 '+thr+'인 미만 사업장은 적용 제외'};
  }
  return o.req?{st:'cond'}:{st:'apply'};
}

          background:"linear-gradient(135deg,rgba(184,146,42,0.12),rgba(184,146,42,0.06))",

          justifyContent:"center",fontSize:15,flexShrink:0,

        <div style={{flex:1,textAlign:"left"}}>

        </div>
        <div style={{fontSize:14,color:C.txt3,fontWeight:700}}>{open?"▲":"▼"}</div>
      </button>

      {open&&(
        <div style={{borderTop:`1px solid ${C.bdrD}`,padding:"16px"}}>

          {/* 공식 설명 */}
          <div style={{background:"#ffffff",borderRadius:10,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:C.goldL,marginBottom:10}}>
              📌 산정 공식 (근로기준법 시행령 §7의2)
            </div>
            <div style={{background:"#f8fafd",border:`1px solid ${C.bdr}`,borderRadius:9,
              padding:"12px 14px",textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:C.txt2,marginBottom:4}}>상시근로자 수 =</div>
              <div style={{fontSize:15,fontWeight:800,color:"#1a2236",lineHeight:1.7}}>
                사유 발생일 직전 <span style={{color:C.goldL}}>1개월간</span> 사용한 근로자 <span style={{color:C.goldL}}>누적인원</span>
                <br/>
                <span style={{fontSize:20,color:C.txt3}}>÷</span>
                <br/>
                같은 기간의 <span style={{color:C.goldL}}>가동일수</span>
              </div>
            </div>

            {/* 포함/제외 기준 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:"rgba(45,168,112,0.06)",border:"1.5px solid rgba(45,168,112,0.2)",
                borderRadius:8,padding:"10px 11px"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#42b883",marginBottom:6}}>✓ 포함</div>
                {["정규직","계약직·기간제","파트타임·알바","일용직","외국인근로자"].map(t=>(
                  <div key={t} style={{fontSize:11,color:"#2a8060",marginBottom:2}}>· {t}</div>
                ))}
              </div>
              <div style={{background:"rgba(208,64,64,0.05)",border:"1.5px solid rgba(208,64,64,0.18)",
                borderRadius:8,padding:"10px 11px"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#d95050",marginBottom:6}}>✕ 제외</div>
                {["사업주·대표이사","동거 친족만 근무(특례)","파견근로자*","임원(근로자 아닌 자)"].map(t=>(
                  <div key={t} style={{fontSize:11,color:"#b04040",marginBottom:2}}>· {t}</div>
                ))}
                <div style={{fontSize:9,color:"#a06060",marginTop:4}}>*산안법 등 일부 예외</div>
              </div>
            </div>

            {/* 용어 설명 */}
            <div style={{fontSize:12,color:"#4a5568",lineHeight:1.7,borderTop:"1px solid #dde8f5",paddingTop:10}}>
              <b style={{color:"#1a2236"}}>누적인원</b>: 기간 내 매일 출근한 인원의 합계<br/>
              예) 5명이 25일 근무 → 누적인원 125명<br/>
              <b style={{color:"#1a2236"}}>가동일수</b>: 실제 사업장이 운영된 날수(휴무일 제외)<br/>
              예) 한 달 25일 운영 → 가동일수 25일<br/>
              <b style={{color:"#b8922a"}}>→ 125 ÷ 25 = 5명</b>
            </div>
          </div>

          {/* 주요 경계 기준 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:C.txt2,marginBottom:8}}>⚖️ 법적 인원 기준</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {BORDERS.map(b=>(
                <div key={b.n} style={{display:"flex",alignItems:"center",gap:10,
                  background:"#ffffff",borderRadius:8,padding:"8px 11px",
                  border:`1px solid ${C.bdrD}`}}>
                  <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:900,
                    color:b.color,width:40,flexShrink:0,textAlign:"center"}}>{b.n}</div>
                  <div style={{flex:1}}>
                    <span style={{fontSize:11,fontWeight:700,color:b.color}}>{b.label}부터</span>
                    <span style={{fontSize:11,color:"#4a5568",marginLeft:5}}>{b.desc}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 직접 계산기 */}
          <div style={{background:"#ffffff",borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#b8922a",marginBottom:10}}>
              🧮 직접 계산해보기
            </div>
            <div style={{background:"rgba(112,89,200,0.05)",border:"1px solid rgba(112,89,200,0.15)",
              borderRadius:9,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#4a5568",lineHeight:1.75}}>
              <div style={{fontWeight:800,color:"#5a4aa8",marginBottom:5}}>📖 두 가지만 입력하면 됩니다</div>
              <div style={{marginBottom:3}}>
                <b style={{color:"#1a2236"}}>① 근무일수</b> = <u>그 사람들이</u> 일한 날 수
                <span style={{color:"#8a96a8"}}> (사람마다 다를 수 있음)</span>
              </div>
              <div>
                <b style={{color:"#1a2236"}}>② 가동일수</b> = <u>가게·사무실이</u> 문 연 날 수
                <span style={{color:"#8a96a8"}}> (사업장 기준 하나)</span>
              </div>
              <div style={{marginTop:6,paddingTop:6,borderTop:"1px dashed rgba(112,89,200,0.2)",color:"#6b7a8d"}}>
                💬 대부분 매일 같은 사람이 나오면 <b style={{color:"#5a4aa8"}}>두 숫자가 같습니다.</b><br/>
                알바·일용직처럼 며칠만 나오는 사람이 있을 때만 달라져요.
              </div>
            </div>

            {/* 입력 행 */}
            <div style={{marginBottom:8}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:6,
                marginBottom:6,paddingBottom:4,borderBottom:`1px solid ${C.bdrD}`}}>
                <div style={{fontSize:10,color:"#4a5568",fontWeight:700}}>몇 명?</div>
                <div style={{fontSize:10,color:"#4a5568",fontWeight:700}}>① 며칠 일했나?</div>
                <div style={{width:24}}/>
              </div>
              {rows.map((r,i)=>(
                <div key={r.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:6,marginBottom:5}}>
                  <input type="number" inputMode="numeric" min="0" placeholder="예) 5명"
                    value={r.workers} onChange={e=>upRow(r.id,"workers",e.target.value)}
                    style={{...INP,padding:"8px 10px",fontSize:13}}/>
                  <input type="number" inputMode="numeric" min="0" max="31" placeholder="예) 25일"
                    value={r.days} onChange={e=>upRow(r.id,"days",e.target.value)}
                    style={{...INP,padding:"8px 10px",fontSize:13}}/>
                  <button onClick={()=>delRow(r.id)}
                    style={{background:"none",border:`1px solid ${C.bdrD}`,color:C.txt3,
                      borderRadius:7,width:30,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
                </div>
              ))}
              <button onClick={addRow}
                style={{width:"100%",background:"none",border:`1px dashed ${C.bdrD}`,
                  color:C.txt3,borderRadius:8,padding:"7px",fontSize:12,fontWeight:700,
                  cursor:"pointer",fontFamily:"inherit",marginTop:4}}>
                + 유형 추가
              </button>
            </div>

            {/* 가동일수 */}
            <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #dde8f5"}}>
              <div style={{fontSize:11,color:"#4a5568",fontWeight:700,marginBottom:5}}>
                ② 가게·사무실이 며칠 문 열었나? <span style={{color:"#8a96a8",fontWeight:400}}>(휴무일 빼고)</span>
              </div>
              <input type="number" inputMode="numeric" min="1" max="31" placeholder="예) 25일 (한 달 거의 매일 영업이면 보통 25~26)"
                value={opDays} onChange={e=>setOpDays(e.target.value)}
                style={{...INP,padding:"9px 12px",fontSize:13}}/>
              {/* 같게 맞추기 도우미: 근무일수가 다 같으면 그 값으로 채워줌 */}
              {(()=>{
                const dayVals=rows.map(r=>r.days).filter(v=>v!=="");
                const allSame=dayVals.length>0 && dayVals.every(v=>v===dayVals[0]);
                if(allSame && opDays!==dayVals[0]){
                  return(
                    <button onClick={()=>setOpDays(dayVals[0])}
                      style={{marginTop:6,background:"rgba(112,89,200,0.07)",
                        border:"1px solid rgba(112,89,200,0.2)",color:"#5a4aa8",
                        borderRadius:8,padding:"7px 11px",fontSize:11,fontWeight:700,
                        cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
                      💡 모두 같은 날수({dayVals[0]}일)네요 → 가동일수도 {dayVals[0]}일로 채우기
                    </button>
                  );
                }
                return null;
              })()}
            </div>

            {/* 입력 안내 (결과가 안 나올 때) */}
            {!(op>0&&totalWorkerDays>0)&&(
              <div style={{background:"rgba(184,146,42,0.06)",border:"1px solid rgba(184,146,42,0.2)",
                borderRadius:10,padding:"11px 14px",marginTop:8,fontSize:12,color:"#7a5e1a",lineHeight:1.6}}>
                💡 결과가 나오려면 위에 <b>몇 명·며칠 일했나(①)</b>를 한 줄 이상 채우고,
                아래 <b>가동일수(②)</b>까지 입력하세요.
                {totalWorkerDays>0&&op<=0&&<div style={{marginTop:4,color:"#b8922a",fontWeight:700}}>→ 이제 ② 가동일수만 입력하면 됩니다!</div>}
              </div>
            )}

            {/* 결과 */}
            {op>0&&totalWorkerDays>0&&(
              <div style={{background:"#f8fafd",border:`1px solid rgba(201,168,76,0.3)`,
                borderRadius:10,padding:"12px 14px",marginTop:8}}>
                <div style={{marginBottom:8}}>
                  <span style={{fontSize:12,color:"#4a5568",fontWeight:700}}>계산 결과</span>
                  <div style={{fontSize:11,color:"#6b7a8d",marginTop:5,lineHeight:1.7,
                    background:"#ffffff",border:"1px solid #dde8f5",borderRadius:8,padding:"8px 10px"}}>
                    누적인원 <b style={{color:"#1a2236"}}>{totalWorkerDays}명</b>
                    <span style={{color:"#8a96a8"}}> (인원×근무일 모두 더함)</span><br/>
                    ÷ 가동일수 <b style={{color:"#1a2236"}}>{op}일</b>
                    <span style={{color:"#8a96a8"}}> = </span>
                    <b style={{color:"#b8922a"}}>{resultRounded}명</b>
                  </div>
                </div>
                <div style={{textAlign:"center",margin:"8px 0"}}>
                  <span style={{fontFamily:"'Noto Serif KR',serif",fontSize:42,
                    fontWeight:900,color:"#b8922a",lineHeight:1}}>
                    {resultRounded}
                  </span>
                  <span style={{fontSize:15,color:C.txt2,marginLeft:4}}>명</span>
                </div>
                {/* 기준 경계 표시 */}
                <div style={{fontSize:12,color:C.txt2,marginBottom:10,textAlign:"center"}}>
                  {BORDERS.filter(b=>Math.ceil(resultRounded)>=b.n).slice(-1).map(b=>(
                    <span key={b.n} style={{color:b.color,fontWeight:700}}>
                      ✓ {b.label} 이상 기준 적용
                    </span>
                  ))}
                  {Math.ceil(resultRounded)<5&&<span style={{color:"#d04040",fontWeight:700}}>⚠ 5인 미만</span>}
                </div>
                <button onClick={()=>{onApply(Math.ceil(resultRounded));setOpen(false);}}
                  style={{width:"100%",background:"linear-gradient(160deg,#d4a83c,#b8922a)",
                    color:"#fff8ec",border:"none",borderRadius:9,padding:"11px",
                    fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
                  {Math.ceil(resultRounded)}명으로 적용하기 →
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   임금명세서 (근로기준법 §48②, 시행령 §27의2)
═══════════════════════════════════════ */
function PayslipPreview({f,pRef}){
  const won=n=>Math.round(n||0).toLocaleString();
  const base=parseFloat(f.basePay)||0;
  const allow=parseFloat(f.allowance)||0;
  const ot=parseFloat(f.otPay)||0;
  const night=parseFloat(f.nightPay)||0;
  const holiday=parseFloat(f.holidayPay)||0;
  const gross=base+allow+ot+night+holiday;
  const emp=parseFloat(f.empIns)||0;
  const indAcc=parseFloat(f.indAccIns)||0;
  const pension=parseFloat(f.pension)||0;
  const health=parseFloat(f.health)||0;
  const longCare=parseFloat(f.longCare)||0;
  const incomeTax=parseFloat(f.incomeTax)||0;
  const localTax=parseFloat(f.localTax)||0;
  const totalDeduct=emp+indAcc+pension+health+longCare+incomeTax+localTax;
  const net=gross-totalDeduct;
  return(
    <div ref={pRef} style={{background:"#fff",color:"#000",
      fontFamily:"'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif",
      fontSize:"9.5pt",lineHeight:1.6,padding:"12mm 14mm",width:794,minHeight:400,boxSizing:"border-box"}}>
      <h2 style={{textAlign:"center",fontSize:"14pt",fontWeight:"bold",
        borderBottom:"2px solid #000",paddingBottom:6,marginBottom:10}}>임 금 명 세 서</h2>
      {/* 근로자 정보 */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10,fontSize:"9pt"}}>
        <tbody>
          <tr>
            <td style={{border:"1px solid #ccc",background:"#f0f0f0",fontWeight:"bold",padding:"4px 8px",width:"18%"}}>성명</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"32%"}}>{f.workerName||"　　　　　"}</td>
            <td style={{border:"1px solid #ccc",background:"#f0f0f0",fontWeight:"bold",padding:"4px 8px",width:"18%"}}>생년월일</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"32%"}}>{f.workerBirth||"　　　　　"}</td>
          </tr>
          <tr>
            <td style={{border:"1px solid #ccc",background:"#f0f0f0",fontWeight:"bold",padding:"4px 8px"}}>사업장명</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>{f.bizName||"　　　　　"}</td>
            <td style={{border:"1px solid #ccc",background:"#f0f0f0",fontWeight:"bold",padding:"4px 8px"}}>임금 지급일</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>{f.payDate||"　　　　　"}</td>
          </tr>
          <tr>
            <td style={{border:"1px solid #ccc",background:"#f0f0f0",fontWeight:"bold",padding:"4px 8px"}}>지급 대상기간</td>
            <td colSpan={3} style={{border:"1px solid #ccc",padding:"4px 8px"}}>
              {f.periodFrom||"　　　　"} ~ {f.periodTo||"　　　　"}
            </td>
          </tr>
        </tbody>
      </table>
      {/* 지급 내역 */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10,fontSize:"9pt"}}>
        <thead>
          <tr>
            <td colSpan={4} style={{background:"#dfe8f5",color:"#e3c86e",fontWeight:"bold",
              padding:"5px 8px",fontSize:"9.5pt",textAlign:"center",border:"1px solid #ccc"}}>
              【 지 급 내 역 】
            </td>
          </tr>
          <tr style={{background:"#f0f0f0",fontWeight:"bold"}}>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"25%"}}>항목</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"25%",textAlign:"right"}}>금액(원)</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"50%"}}>산출근거</td>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>① 기본급</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(base)}</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",fontSize:"8.5pt",color:"#444"}}>
              {f.baseCalc||"시급 × 소정근로시간"}
            </td>
          </tr>
          {allow>0&&<tr>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>② 제수당</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(allow)}</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",fontSize:"8.5pt",color:"#444"}}>
              {f.allowanceNote||"각종 수당"}
            </td>
          </tr>}
          {ot>0&&<tr>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>③ 연장근로수당</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(ot)}</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",fontSize:"8.5pt",color:"#444"}}>
              {f.otCalc||`연장 ${f.otHours||0}h × 시급 × 1.5`}
            </td>
          </tr>}
          {night>0&&<tr>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>④ 야간근로수당</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(night)}</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",fontSize:"8.5pt",color:"#444"}}>
              {f.nightCalc||`야간 ${f.nightHours||0}h × 시급 × 0.5`}
            </td>
          </tr>}
          {holiday>0&&<tr>
            <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>⑤ 휴일근로수당</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(holiday)}</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",fontSize:"8.5pt",color:"#444"}}>
              {f.holidayCalc||`휴일 ${f.holidayHours||0}h × 시급 × 1.5`}
            </td>
          </tr>}
          <tr style={{background:"#fffde7",fontWeight:"bold"}}>
            <td style={{border:"1px solid #ccc",padding:"5px 8px"}}>지급 합계</td>
            <td style={{border:"1px solid #ccc",padding:"5px 8px",textAlign:"right",
              fontSize:"10pt"}}>{won(gross)}</td>
            <td style={{border:"1px solid #ccc",padding:"5px 8px"}}></td>
          </tr>
        </tbody>
      </table>
      {/* 공제 내역 */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10,fontSize:"9pt"}}>
        <thead>
          <tr>
            <td colSpan={3} style={{background:"#2a1a1a",color:"#e88",fontWeight:"bold",
              padding:"5px 8px",textAlign:"center",border:"1px solid #ccc"}}>
              【 공 제 내 역 】
            </td>
          </tr>
          <tr style={{background:"#f0f0f0",fontWeight:"bold"}}>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"34%"}}>항목</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"33%",textAlign:"right"}}>금액(원)</td>
            <td style={{border:"1px solid #ccc",padding:"4px 8px",width:"33%"}}>비고</td>
          </tr>
        </thead>
        <tbody>
          {[[emp,"고용보험료"],[indAcc,"산재보험료"],[pension,"국민연금"],[health,"건강보험료"],[longCare,"장기요양보험료"],[incomeTax,"소득세"],[localTax,"지방소득세"]].map(([v,k])=>v>0&&(
            <tr key={k}>
              <td style={{border:"1px solid #ccc",padding:"4px 8px"}}>{k}</td>
              <td style={{border:"1px solid #ccc",padding:"4px 8px",textAlign:"right"}}>{won(v)}</td>
              <td style={{border:"1px solid #ccc",padding:"4px 8px"}}></td>

          ))}
          <tr style={{background:"#fff0f0",fontWeight:"bold"}}>
            <td style={{border:"1px solid #ccc",padding:"5px 8px"}}>공제 합계</td>
            <td style={{border:"1px solid #ccc",padding:"5px 8px",textAlign:"right",
              fontSize:"10pt"}}>{won(totalDeduct)}</td>
            <td style={{border:"1px solid #ccc",padding:"5px 8px"}}></td>
          </tr>
        </tbody>
      </table>
      {/* 실수령액 */}
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11pt",fontWeight:"bold"}}>
        <tbody>
          <tr style={{background:"#eef3f9",color:"#e3c86e"}}>
            <td style={{border:"2px solid #c9a84c",padding:"8px 12px",width:"50%",textAlign:"center"}}>
              실 수 령 액
            </td>
            <td style={{border:"2px solid #c9a84c",padding:"8px 12px",textAlign:"right",
              fontSize:"13pt"}}>
              {won(net)} 원
            </td>

      </table>
      <div style={{marginTop:12,fontSize:"8pt",color:"#666",lineHeight:1.7}}>
        ※ 본 명세서는 근로기준법 제48조 제2항에 따라 교부합니다.<br/>
        ※ 산재보험료는 전액 사업주 부담입니다.
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════
   퇴직금 계산기 (근퇴법 §8, 근기법 §2)
═══════════════════════════════════════ */
function RetirementScreen({onBack,lang,setLang}){
  const ko=lang==='ko';
  const won=n=>Math.round(n||0).toLocaleString();
  const [tab,setTab]=useState('avg'); // avg|std|db|dc
  // 공통: 근속기간
  const [startDate,setStartDate]=useState('');
  const [endDate,setEndDate]=useState('');
  const [lastDayMode,setLastDayMode]=useState(false);
  // 평균임금 탭
  const [m1,setM1]=useState('');  // 퇴직전 3개월 각 임금
  const [m2,setM2]=useState('');
  const [m3,setM3]=useState('');
  const [d1,setD1]=useState('31'); // 각 달 일수
  const [d2s,setD2s]=useState('30');
  const [d3s,setD3s]=useState('31');
  const [bonus,setBonus]=useState(''); // 연간 상여금 총액
  const [leavePay,setLeavePay]=useState(''); // 연간 연차수당
  // 통상임금 탭
  const [monthlyStd,setMonthlyStd]=useState('');  // 월 통상임금
  // DC형
  const [annualWage,setAnnualWage]=useState('');   // 연간 임금총액
  const [returnRate,setReturnRate]=useState('3.0'); // 예상 운용수익률

  // 근속 계산
  const tenure = useMemo(()=>{
    if(!startDate||!endDate) return null;
    const s=new Date(startDate);
    const rawE=new Date(endDate);
    const e=lastDayMode?new Date(rawE.getTime()+86400000):rawE;
    if(e<=s) return null;
    const totalDays=Math.floor((e-s)/(1000*60*60*24));
    const years=totalDays/365.25;
    const y=Math.floor(years);
    const rem=totalDays-(y*365);
    const m=Math.floor(rem/30);
    const d=rem-(m*30);
    return{totalDays,years,y,m,d};
  },[startDate,endDate,lastDayMode]);

  const eligible = tenure && tenure.totalDays>=365; // 1년 이상

  // 평균임금 계산
  const avgResult = useMemo(()=>{
    if(!tenure) return null;
    const wages=[parseFloat(m1)||0,parseFloat(m2)||0,parseFloat(m3)||0];
    const days3m=(parseFloat(d1)||31)+(parseFloat(d2s)||30)+(parseFloat(d3s)||31);
    const bonusAmt=parseFloat(bonus)||0;
    const leaveAmt=parseFloat(leavePay)||0;
    const total3m=wages.reduce((a,b)=>a+b,0)+(bonusAmt*3/12)+(leaveAmt*3/12);
    const avgDaily=days3m>0?total3m/days3m:0;
    const retirement=eligible?avgDaily*30*(tenure.totalDays/365):0;
    return{avgDaily,retirement,days3m,total3m};
  },[m1,m2,m3,d1,d2s,d3s,bonus,leavePay,tenure,eligible]);

  // 통상임금 계산
  const stdResult = useMemo(()=>{
    if(!tenure) return null;
    const mStd=parseFloat(monthlyStd)||0;
    const dailyStd=mStd*12/365;
    const retirement=eligible?dailyStd*30*(tenure.totalDays/365):0;
    return{dailyStd,retirement};
  },[monthlyStd,tenure,eligible]);

  // DB형: 평균임금 기준과 동일 (avgResult 재사용)
  // DC형 계산
  const dcResult = useMemo(()=>{
    if(!tenure) return null;
    const annual=parseFloat(annualWage)||0;
    const rate=(parseFloat(returnRate)||0)/100;
    const yearsFrac=tenure.totalDays/365.25;
    // DC형: 매년 '연간임금 ÷ 12'(= 한 달치 월급)를 적립
    const yearly=annual/12;          // 연간 납입액 (한 해 적립액)
    // 원금 합계 = 연간 납입액 × 근속연수
    const base=yearly*yearsFrac;
    // 연복리 운용 추정: 매년 yearly를 넣고 남은 기간만큼 복리
    let compound=0;
    const yrs=Math.floor(yearsFrac);
    for(let i=1;i<=yrs;i++){
      compound+=yearly*Math.pow(1+rate,yearsFrac-i);
    }
    if(yearsFrac>yrs){
      compound+=yearly*(yearsFrac-yrs); // 1년 미만 잔여기간(수익 미적용 보수적)
    }
    return{base,compound,annualInput:yearly,yearsFrac};
  },[annualWage,returnRate,tenure]);

  const TABS=[
    {id:'avg',label:'평균임금',sub:'법정 기준'},
    {id:'std',label:'통상임금',sub:'비교 검토'},
    {id:'db', label:'DB형',   sub:'확정급여형'},
    {id:'dc', label:'DC형',   sub:'확정기여형'},
  ];

  return(
    <div style={{background:'#f6f9fd',minHeight:'100vh',
      fontFamily:"-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif",maxWidth:520,margin:'0 auto'}}>
      <SubHdr title="🏦 퇴직금 계산기" back={onBack}
        lang={lang} setLang={setLang}/>

      <div style={{padding:'14px 16px 80px'}}>

        {/* 탭 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:5,marginBottom:16}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:'9px 4px',borderRadius:11,border:'none',fontFamily:'inherit',
                cursor:'pointer',textAlign:'center',
                background:tab===t.id?'linear-gradient(160deg,#d4a83c,#b8922a)':'#ffffff',
                color:tab===t.id?'#fff8ec':'#6b7a8d',
                boxShadow:tab===t.id?'0 3px 14px rgba(184,146,42,0.35)':'0 1px 4px rgba(30,50,90,0.06)',
                border:tab===t.id?'none':'1.5px solid #dde8f5'}}>
              <div style={{fontSize:12,fontWeight:800}}>{t.label}</div>
              <div style={{fontSize:9,opacity:.75}}>{t.sub}</div>
            </button>
          ))}
        </div>

        {/* ── 공통: 근속기간 ── */}
        <div style={{background:"#ffffff",border:"1.5px solid #dde8f5",borderRadius:14,padding:'15px',marginBottom:14,boxShadow:"0 2px 10px rgba(30,50,90,0.05)"}}>
          <div style={{fontSize:12,fontWeight:800,color:"#b8922a",marginBottom:8,letterSpacing:"0.2px"}}>📅 근속기간 (공통)</div>
          <div style={{background:'rgba(201,168,76,0.07)',border:'1px solid rgba(201,168,76,0.25)',
            borderRadius:8,padding:'9px 11px',marginBottom:10,fontSize:11,color:C.txt2,lineHeight:1.7}}>
            <b style={{color:C.goldL}}>퇴직일 = 마지막 근무일의 다음 날</b><br/>
            예) 12월 31일이 마지막 출근일 → 퇴직일은 <b style={{color:"#1a2236"}}>다음해 1월 1일</b><br/>
            근기법상 퇴직일 = 근로관계가 실제로 끝나는 날(마지막 근무일+1일)
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <button onClick={()=>setLastDayMode(p=>!p)}
              style={{background:lastDayMode?"linear-gradient(135deg,#d4a83c,#b8922a)":"#f4f8fd",
                border:`1.5px solid ${lastDayMode?"#c9a030":"#dde8f5"}`,
                color:lastDayMode?"#fff8ec":"#6b7a8d",
                boxShadow:lastDayMode?"0 2px 8px rgba(184,146,42,0.3)":"none",
                borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:700,
                cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>
              {lastDayMode?'ON: 마지막 근무일 입력':'OFF: 퇴직일 직접 입력'}
            </button>
            <span style={{fontSize:10,color:C.txt3,lineHeight:1.5}}>
              {lastDayMode?'입력한 날 자동 +1일 = 퇴직일':'퇴직일(마지막근무일+1)을 직접 입력'}
            </span>
          </div>
          <div style={R2}>
            <RetFieldRow label="입사일 *">
              <DateInput style={INP} value={startDate} onChange={e=>setStartDate(e.target.value)} label="입사일 선택"/>
            </RetFieldRow>
            <RetFieldRow label={lastDayMode?"마지막 근무일 *":"퇴직일 * (마지막 근무일의 다음날)"}>
              <DateInput style={INP} value={endDate} onChange={e=>setEndDate(e.target.value)} label={lastDayMode?"마지막 근무일 선택":"퇴직일 선택"}/>
            </RetFieldRow>
          </div>
          {tenure&&(
            <div style={{marginTop:8,padding:'10px 13px',
              background:"linear-gradient(135deg,rgba(184,146,42,0.06),rgba(184,146,42,0.03))",
              border:"1px solid rgba(184,146,42,0.15)",borderRadius:10,
              fontSize:12,color:"#3a4a5c",lineHeight:1.9}}>
              <span style={{fontWeight:800,color:"#b8922a"}}>
                {tenure.y}년 {tenure.m}개월 {tenure.d}일
              </span>
              <span style={{color:C.txt3,marginLeft:8}}>({tenure.totalDays.toLocaleString()}일)</span>
              {!eligible&&(
                <div style={{color:C.red,fontSize:11,marginTop:3}}>
                  ⚠ 계속근로 1년 미만 — 법정 퇴직금 발생하지 않습니다
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── 평균임금 탭 ── */}
        {tab==='avg'&&(
          <div>
            <RetInfoBox text={
              `📌 평균임금 = (퇴직 전 3개월 임금 + 연간상여금×3/12 + 연차수당×3/12) ÷ 3개월 총일수\n` +
              `퇴직금 = 1일 평균임금 × 30일 × 근속일수÷365 (근기법 §2, 근퇴법 §8)`
            }/>
            <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,padding:14}}>
              <div style={{fontSize:12,fontWeight:800,color:C.goldL,marginBottom:10}}>퇴직 전 3개월 임금</div>
              {[
                ['3개월 전 임금(원)',m1,setM1,d1,setD1],
                ['2개월 전 임금(원)',m2,setM2,d2s,setD2s],
                ['1개월 전 임금(원)',m3,setM3,d3s,setD3s],
              ].map(([label,val,set,dv,ds],i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:8,marginBottom:8}}>
                  <RetFieldRow label={label}>
                    <MoneyInput style={INP} placeholder="3,000,000" value={val} onChange={nv=>set(nv)}/>
                  </RetFieldRow>
                  <RetFieldRow label="해당월 일수">
                    <input style={{...INP,width:52,padding:'9px 4px',textAlign:'center'}} type="number" inputMode="numeric"
                      min="28" max="31" value={dv} onChange={e=>ds(e.target.value)}/>
                  </RetFieldRow>
                </div>
              ))}
              <div style={{height:1,background:C.bdrD,margin:'8px 0'}}/>
              <div style={R2}>
                <RetFieldRow label="연간 상여금 총액(원)">
                  <MoneyInput style={INP} placeholder="0" value={bonus} onChange={nv=>setBonus(nv)}/>
                </RetFieldRow>
                <RetFieldRow label="연간 연차수당(원)">
                  <MoneyInput style={INP} placeholder="0" value={leavePay} onChange={nv=>setLeavePay(nv)}/>
                </RetFieldRow>
              </div>
            </div>
            {avgResult&&avgResult.avgDaily>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>3개월 임금합계</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(avgResult.total3m)}원</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>3개월 총일수</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{avgResult.days3m}일</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>1일 평균임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.goldL}}>{won(avgResult.avgDaily)}원</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>30일분 평균임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(avgResult.avgDaily*30)}원</div>
                  </div>
                </div>
                {eligible
                  ?<RetResultBox label="예상 퇴직금 (평균임금 기준)" amount={avgResult.retirement}
                      sub={`1일 평균임금 ${won(avgResult.avgDaily)}원 × 30일 × ${(tenure.totalDays/365).toFixed(4)}년`}/>
                  :<div style={{marginTop:12,padding:'12px',background:'rgba(217,80,80,0.08)',
                    border:'1px solid rgba(217,80,80,0.3)',borderRadius:12,fontSize:12,color:C.red,textAlign:'center'}}>
                    계속근로 1년 이상이어야 퇴직금이 발생합니다
                  </div>
                }
              </div>
            )}
          </div>
        )}

        {/* ── 통상임금 탭 ── */}
        {tab==='std'&&(
          <div>
            <RetInfoBox text={
              `📌 통상임금 = 기본급 + 정기·일률·고정적으로 지급되는 수당의 합계\n` +
              `1일 통상임금 = 월 통상임금 × 12 ÷ 365\n` +
              `평균임금 < 통상임금이면 통상임금으로 퇴직금 계산 (근기법 §2②)\n` +
              `→ 평균임금 탭과 비교 후 높은 금액 적용`
            }/>
            <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:12,padding:14}}>
              <div style={{fontSize:12,fontWeight:800,color:C.goldL,marginBottom:10}}>월 통상임금</div>
              <RetFieldRow label="기본급 (원)">
                <MoneyInput style={INP} placeholder="기본급" value={monthlyStd} onChange={nv=>setMonthlyStd(nv)}/>
              </RetFieldRow>
              <div style={{fontSize:11,color:C.txt3,marginTop:4,lineHeight:1.6}}>
                ※ 식대·교통비 등 고정 지급 수당은 기본급에 합산하여 입력하세요<br/>
                ※ 초과근무수당·상여금(비고정)은 제외
              </div>
            </div>
            {stdResult&&stdResult.dailyStd>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:4}}>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>1일 통상임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.goldL}}>{won(stdResult.dailyStd)}원</div>
                    <div style={{fontSize:9,color:C.txt3}}>월통상임금×12÷365</div>
                  </div>
                  <div style={{background:"#eef4fb",border:`1px solid ${C.bdrD}`,borderRadius:10,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:C.txt3}}>30일분 통상임금</div>
                    <div style={{fontSize:13,fontWeight:700,color:"#1a2236"}}>{won(stdResult.dailyStd*30)}원</div>
                  </div>
                </div>
                {eligible
                  ?<RetResultBox label="예상 퇴직금 (통상임금 기준)" amount={stdResult.retirement}
                      sub={`1일 통상임금 ${won(stdResult.dailyStd)}원 × 30일 × ${(tenure.totalDays/365).toFixed(4)}년`}/>
                  :<div style={{marginTop:12,padding:'12px',background:'rgba(217,80,80,0.08)',
                    border:'1px solid rgba(217,80,80,0.3)',borderRadius:12,fontSize:12,color:C.red,textAlign:'center'}}>
                    계속근로 1년 이상이어야 퇴직금이 발생합니다
                  </div>
                }
                {stdResult&&avgResult?.avgDaily>0&&eligible&&(
                  <div style={{marginTop:8,padding:'10px 12px',borderRadius:10,fontSize:12,
                    background: stdResult.retirement>avgResult.retirement
                      ?'rgba(58,184,122,0.08)':'rgba(201,168,76,0.06)',
                    border:`1px solid ${stdResult.retirement>avgResult.retirement?'rgba(58,184,122,0.3)':'rgba(201,168,76,0.2)'}`}}>
                    <span style={{fontWeight:700,
                      color:stdResult.retirement>avgResult.retirement?C.green:C.gold}}>
                      {stdResult.retirement>avgResult.retirement
                        ?'✓ 통상임금 기준이 더 높음 → 통상임금 적용'
                        :'평균임금 기준이 더 높음 → 평균임금 탭 값 적용'}
                    </span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── DB형 탭 ── */}
        {tab==='db'&&(
          <div>
            <RetInfoBox text={
              `📌 DB형(확정급여형) 퇴직연금 (근퇴법 §15)\n` +
              `급여 = 퇴직 직전 3개월 평균임금 × 30일 × 근속연수\n` +
              `계산 방식은 법정퇴직금과 동일 — 차이점:\n` +
              `· 사용자가 외부 금융기관에 적립·운용\n` +
              `· 중간정산 원칙 불가 (사유 있을 때 예외)\n` +
              `· 운용 손실은 사용자가 부담\n` +
              `→ 평균임금 탭에서 계산한 값이 DB형 예상 급여와 동일합니다`
            }/>
            {avgResult?.retirement>0&&eligible
              ?<RetResultBox label="DB형 퇴직연금 예상 급여 (= 법정퇴직금)" amount={avgResult.retirement}

  // 스텝2: 결과

/* ============================================================
   사업주 — 근로계약서 작성 (4종, 직원 자동완성)
============================================================ */
function ContractScreen({ onBack, workers, workplace, user }) {
  const [ctTab, setCtTab] = useState("std");
  const [ctStep, setCtStep] = useState("input");
  const [selWorker, setSelWorker] = useState("");
  const ownerName = user?.user_metadata?.name || "";
  const [ctFields, setCtFields] = useState(() => {
    const base = { biz: workplace?.name || "", owner: ownerName };
    return { std: { period: "open", ...base }, part: { ...base }, const: { ...base }, minor: { ...base } };
  });
  const pRef = useRef(null);
  const curCt = ctFields[ctTab];
  const setCur = fn => setCtFields(p => ({ ...p, [ctTab]: fn(p[ctTab]) }));
  const upField = (k, v) => setCur(p => ({ ...p, [k]: v }));
  const fillWorker = (wid) => {
    setSelWorker(wid);
    const w = (workers || []).find(x => String(x.id) === String(wid));
    if (!w) return;
    setCtFields(p => {
      const n = { ...p };
      Object.keys(n).forEach(k => { n[k] = { ...n[k], worker: w.name, biz: workplace?.name || n[k].biz }; });
      return n;
    });
  };
  const printPDF=()=>{
    const el=pRef.current; if(!el) return;
    const w=window.open("","_blank");
    if(!w){alert("팝업이 차단됐습니다.");return;}
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <style>*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif}
      @page{size:A4 portrait;margin:0}@media print{html,body{-webkit-print-color-adjust:exact}}</style>
      </head><body>${el.innerHTML}</body></html>`);
    w.document.close(); setTimeout(()=>{w.focus();w.print();},700);
  };
    const Prev=PrevMap[ctTab]; const Inp=InputMap[ctTab];
    const meta=FORM_TYPES.find(f=>f.id===ctTab);
    return(
      <div style={{background:'#f6f9fd',minHeight:"100vh",fontFamily:"-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif"}}>
        <SubHdr title={ctStep==="input"?`${meta.ic} ${meta.label}`:"📄 미리보기"}
          back={ctStep==="preview"?()=>setCtStep("input"):onBack}
          lang={"ko"} setLang={()=>{}}
          right={ctStep==="preview"&&(
            <button onClick={printPDF} style={{
              background:"linear-gradient(135deg,#d4a83c,#b8922a)",
              color:"#fff8ec",border:"none",borderRadius:9,padding:"7px 13px",fontSize:12,
              fontWeight:800,cursor:"pointer",fontFamily:"inherit",flexShrink:0,
              boxShadow:"0 2px 8px rgba(184,146,42,0.35)"}}>🖨 PDF</button>
          )}/>

        {ctStep==="input"&&(
          <div style={{maxWidth:600,margin:"0 auto",padding:"14px 14px 90px"}}>
            {workers&&workers.length>0&&(
              <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:12,
                padding:"11px 13px",marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:800,color:"#3b6ec4",marginBottom:7}}>
                  ⚡ 등록된 직원 정보 자동 입력
                </div>
                <select style={SEL} value={selWorker} onChange={e=>fillWorker(e.target.value)}>
                  <option value="">직원 선택 → 성명·사업장 자동 채움</option>
                  {workers.map(w=><option key={w.id} value={w.id}>{w.name} (시급 {Number(w.hourly||0).toLocaleString()}원)</option>)}
                </select>
              </div>
            )}
            {/* 서식 선택 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:14}}>
              {FORM_TYPES.map(ft=>(
                <button key={ft.id} onClick={()=>setCtTab(ft.id)}
                  style={{background:ctTab===ft.id?"linear-gradient(135deg,rgba(184,146,42,0.1),rgba(184,146,42,0.05))":"#ffffff",
                    border:`1.5px solid ${ctTab===ft.id?"rgba(184,146,42,0.4)":"#dde8f5"}`,
                    color:ctTab===ft.id?"#b8922a":"#4a5568",
                    borderRadius:12,padding:"12px 10px",cursor:"pointer",fontFamily:"inherit",
                    display:"flex",alignItems:"center",gap:7,textAlign:"left",
                    boxShadow:ctTab===ft.id?"0 2px 10px rgba(184,146,42,0.15)":"0 1px 4px rgba(30,50,90,0.05)"}}>
                  <span style={{fontSize:18}}>{ft.ic}</span>
                  <span style={{lineHeight:1.3}}>
                    <div style={{fontSize:12,fontWeight:700}}>{ft.label}</div>
                    <div style={{fontSize:10,opacity:.65}}>{ft.sub}</div>
                  </span>
                </button>
              ))}
            </div>
            <div style={{background:"#ffffff",border:"1.5px solid #dde8f5",borderRadius:14,padding:18,boxShadow:"0 2px 12px rgba(30,50,90,0.05)"}}>
              <Inp f={curCt} u={upField}/>
            </div>
            <div style={{fontSize:9.5,color:C.txt3,lineHeight:1.7,padding:'8px 4px 0'}}>
              ※ 고용노동부 표준양식을 기초로 한 참고 서식입니다. 작성한 계약서는 근로자에게
              반드시 서면 교부하세요(근기법 §17). 개별 사안의 법적 검토는 ☎1350 또는 공인노무사에게 확인하세요.
            </div>
          </div>
        )}

        {ctStep==="preview"&&(
          <div style={{padding:"12px 10px 40px"}}>
            <div style={{fontSize:11,color:C.txt3,textAlign:"center",marginBottom:10}}>
              📄 A4 실제 출력물과 동일 · PDF 저장 후 인쇄
            </div>
            <div style={{background:"#e8eef5",borderRadius:12,padding:"12px 10px",boxShadow:"inset 0 2px 8px rgba(30,50,90,0.08)"}}>
              <ScaledPreview pRef={pRef}><Prev f={curCt}/></ScaledPreview>
            </div>
          </div>
        )}

        {ctStep==="input"&&(
          <div style={{position:"fixed",bottom:0,left:0,right:0,
            background:"#f4f8fd",borderTop:"1px solid #dde8f5",padding:"14px 16px 16px",zIndex:15}}>
            <BigBtn onClick={()=>setCtStep("preview")}>미리보기 · 저장 →</BigBtn>
          </div>
        )}
      </div>
    );
}

function AuthScreen({ onAuth, onGuest }) {
  const [mode, setMode] = useState('login'); // login | signup
  const [role, setRole] = useState('employer'); // employer | worker
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [message, setMessage] = useState('');

  const handleKakao = async () => {
    setError('');
    const { error: e } = await sb.auth.signInWithOAuth({
      provider: 'kakao',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if (e) setError('카카오 로그인 오류: ' + e.message);
  };

  const handleSubmit = async () => {
    if (!email || !password) { setError('이메일과 비밀번호를 입력해주세요'); return; }
    setLoading(true); setError('');
    try {
      if (mode === 'signup') {
        if (!name) { setError('이름을 입력해주세요'); setLoading(false); return; }
        const { data, error: e } = await sb.auth.signUp({
          email, password,
          options: { data: { name, role } }
        });
        if (e) throw e;
        if (data.user && !data.session) {
          setMessage('이메일 확인 링크를 보냈습니다. 확인 후 로그인해주세요.');
        } else if (data.session) {
          onAuth(data.session.user, role);
        }
      } else {
        const { data, error: e } = await sb.auth.signInWithPassword({ email, password });
        if (e) throw e;
        const userRole = data.user.user_metadata?.role || 'employer';
        onAuth(data.user, userRole);
      }
    } catch (e) {
      setError(e.message === 'Invalid login credentials'
        ? '이메일 또는 비밀번호가 틀렸습니다'
        : e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ padding: 20 }}>
      <div style={{ textAlign: 'center', padding: '30px 0 24px' }}>
        <div style={{
          fontWeight: 900, fontSize: 26, background: goldGrad,
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          marginBottom: 6
        }}>노무길잡이</div>
        <div style={{ fontSize: 12, color: C.t3 }}>원스탑 노무관리 서비스</div>
      </div>

      {message ? (
        <Card style={{ background: '#f0fdf4', borderColor: '#bbf7d0', textAlign: 'center', padding: 24 }}>
          <div style={{ fontSize: 24, marginBottom: 8 }}>📧</div>
          <div style={{ fontSize: 13, color: C.green, fontWeight: 700 }}>{message}</div>
        </Card>
      ) : (
        <Card>
          {/* 역할 선택 (회원가입만) */}
          {mode === 'signup' && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.t2, marginBottom: 6 }}>역할 선택</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                <button onClick={() => setRole('employer')} style={{
                  padding: '10px', borderRadius: 9, cursor: 'pointer',
                  background: role === 'employer' ? goldGrad : '#f9fafb',
                  color: role === 'employer' ? '#fff' : C.t2,
                  border: `1.5px solid ${role === 'employer' ? C.gold : C.border}`,
                  fontWeight: 700, fontSize: 12
                }}>🏢 사업주</button>
                <button onClick={() => setRole('worker')} style={{
                  padding: '10px', borderRadius: 9, cursor: 'pointer',
                  background: role === 'worker' ? blueGrad : '#f9fafb',
                  color: role === 'worker' ? '#fff' : C.t2,
                  border: `1.5px solid ${role === 'worker' ? C.blue : C.border}`,
                  fontWeight: 700, fontSize: 12
                }}>👤 근로자</button>
              </div>
            </div>
          )}

          {mode === 'signup' && (
            <Field label="이름" value={name} onChange={setName} placeholder="홍길동" />
          )}
          <Field label="이메일" type="email" value={email} onChange={setEmail}
                 placeholder="example@email.com" />
          <Field label="비밀번호" type="password" value={password} onChange={setPassword}
                 placeholder="6자 이상" />

          {error && (
            <div style={{ fontSize: 11, color: C.red, marginBottom: 8, padding: '6px 8px',
                          background: '#fff5f5', borderRadius: 6 }}>{error}</div>
          )}

          <Btn onClick={handleSubmit} disabled={loading}
               style={{ width: '100%', marginTop: 4 }} size="lg">
            {loading ? '처리 중...' : mode === 'login' ? '로그인' : '회원가입'}
          </Btn>

          {/* 구분선 */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '14px 0' }}>
            <div style={{ flex: 1, height: 1, background: C.border }} />
            <span style={{ fontSize: 10, color: C.t3 }}>또는</span>
            <div style={{ flex: 1, height: 1, background: C.border }} />
          </div>

          {/* 카카오 로그인 */}
          <button onClick={handleKakao} style={{
            width: '100%', padding: '12px', borderRadius: 10, border: 'none',
            background: '#FEE500', color: '#191600', fontWeight: 800, fontSize: 14,
            cursor: 'pointer', display: 'flex', alignItems: 'center',
            justifyContent: 'center', gap: 8
          }}>
            <span style={{ fontSize: 16 }}>💬</span> 카카오로 시작하기
          </button>

          {/* 둘러보기 */}
          <button onClick={onGuest} style={{
            width: '100%', padding: '11px', borderRadius: 10, marginTop: 8,
            background: 'transparent', color: C.t2,
            border: `1.5px solid ${C.border}`, fontWeight: 700, fontSize: 13,
            cursor: 'pointer'
          }}>
            👀 로그인 없이 둘러보기
          </button>

          <div style={{ textAlign: 'center', marginTop: 14, fontSize: 12, color: C.t3 }}>
            {mode === 'login' ? (
              <>계정이 없으신가요?{' '}
                <span onClick={() => { setMode('signup'); setError(''); }}
                      style={{ color: C.gold, fontWeight: 700, cursor: 'pointer' }}>
                  회원가입
                </span>
              </>
            ) : (
              <>이미 계정이 있으신가요?{' '}
                <span onClick={() => { setMode('login'); setError(''); }}
                      style={{ color: C.gold, fontWeight: 700, cursor: 'pointer' }}>
                  로그인
                </span>
              </>
            )}
          </div>
        </Card>
      )}
    </div>
  );
}

function WorkplaceSetup({ user, onDone }) {
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const create = async () => {
    if (!name.trim()) { setError('사업장명을 입력해주세요'); return; }
    setLoading(true);
    const code = Math.random().toString(36).substring(2,5).toUpperCase() + '-' +
      String(Math.floor(Math.random()*9000+1000));
    const { data, error: e } = await sb.from('workplaces').insert({
      name: name.trim(),
      owner_id: user.id,
      invite_code: code,
    }).select().single();
    if (e) { setError(e.message); setLoading(false); return; }
    onDone(data);
  };

  return (
    <div style={{ padding: 20 }}>
      <div style={{ textAlign: 'center', padding: '20px 0 16px' }}>

function WorkersTab({ user, workplace, workers, onRefresh }) {

  const [hr, setHr] = useState('10320');

    if (!nm.trim()) { alert('이름을 입력해주세요'); return; }
    const h = Number(String(hr).replace(/,/g, '')) || 0;

    if (h < MIN_WAGE && !confirm(
      `시급 ${h.toLocaleString()}원은 2026년 최저임금(${MIN_WAGE.toLocaleString()}원)보다 낮습니다.\n` +

      `그래도 이 금액으로 저장할까요?`)) return;
    setSaving(true);

function AttendanceTab({ user, workplace, workers, attendance, onRefresh }) {
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [showAdd, setShowAdd] = useState(false);
  const [aWid, setAWid] = useState('');
  const [aIn, setAIn] = useState('09:00');
  const [aOut, setAOut] = useState('18:00');
  const [aBreak, setABreak] = useState('1');
  const [aPaid, setAPaid] = useState(false);

  const dayRecs = attendance.filter(a => a.date === selectedDate);
  const getWorkerName = (wid) => workers.find(w => String(w.id) === String(wid))?.name || '알 수 없음';

  const approve = async (id) => {
    await sb.from('attendance').update({ status: 'approved' }).eq('id', id);
    onRefresh();
  };
  const removeRec = async (id) => {
    if (!confirm('이 기록을 삭제할까요?')) return;
    await sb.from('attendance').delete().eq('id', id);
    onRefresh();
  };

  const addRecord = async () => {
    const wid = aWid || (workers[0] && workers[0].id);
    if (!wid) { alert('먼저 근로자 탭에서 직원을 등록해주세요'); return; }
    if (!aIn) { alert('출근 시각을 입력해주세요'); return; }
    await sb.from('attendance').insert({
      workplace_id: workplace.id,
      worker_id: wid,
      date: selectedDate,
      in_time: aIn,
      out_time: aOut || null,
      break_h: Number(aBreak) || 0,
      break_paid: aPaid,
      status: 'approved',
      source: 'employer'
    });
    setShowAdd(false);
    onRefresh();
  };

  return (
    <div>
      <Header title="출퇴근 관리" subtitle="근로자 입력 승인 또는 직접 입력" />

              width: '100%', padding: '8px', fontSize: 13, fontWeight: 700,
              border: `1.5px solid ${C.border}`, borderRadius: 7, textAlign: 'center', outline: 'none'
            }} />
        </Card>

        <Btn variant={showAdd ? 'secondary' : 'primary'} size="md"
             style={{ width: '100%', marginBottom: 12 }}
             onClick={() => setShowAdd(!showAdd)}>
          {showAdd ? '▲ 입력 닫기' : `📝 ${selectedDate} 기록 직접 입력`}
        </Btn>

        {showAdd && (
          <Card style={{ marginBottom: 14 }}>
            <FLD label="직원">
              <select style={SEL} value={aWid} onChange={e => setAWid(e.target.value)}>
                {workers.length === 0 && <option value="">직원을 먼저 등록하세요</option>}
                {workers.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </FLD>
            <div style={R2}>
              <FLD label="출근">
                <input type="time" style={INP} value={aIn} onChange={e => setAIn(e.target.value)} />
              </FLD>
              <FLD label="퇴근">
                <input type="time" style={INP} value={aOut} onChange={e => setAOut(e.target.value)} />
              </FLD>
            </div>
            <div style={R2}>
              <FLD label="휴게 (h)">
                <input type="tel" style={INP} value={aBreak} onChange={e => setABreak(e.target.value)} placeholder="1" />
              </FLD>
              <FLD label="휴게 임금">
                <select style={SEL} value={aPaid ? '1' : '0'} onChange={e => setAPaid(e.target.value === '1')}>
                  <option value="0">무급 (근무시간 제외)</option>

                </select>
              </FLD>
            </div>
            <div style={{ fontSize: 9.5, color: C.t3, lineHeight: 1.6, marginBottom: 10 }}>

            </div>

        )}

        {dayRecs.length === 0 ? (
          <Card style={{ textAlign: 'center', padding: 28, color: C.t3, marginBottom: 14 }}>
            <div style={{ fontSize: 32, marginBottom: 6 }}>🕐</div>

          dayRecs.map(rec => {

            return (
              <Card key={rec.id} style={{
                marginBottom: 10,
                borderColor: isPending ? '#fed7d7' : C.border,

              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                  <span style={{ fontWeight: 800, fontSize: 14 }}>{getWorkerName(rec.worker_id)}</span>

                  {isPending ? <Badge color="red">⏳ 미확인</Badge> : <Badge color="green">✓ 확인</Badge>}
                </div>
                <div style={{ display: 'flex', gap: 14, fontSize: 12, color: C.t2, marginBottom: 8 }}>
                  <span>출근 <strong>{rec.in_time || '-'}</strong></span>
                  <span>퇴근 <strong>{rec.out_time || '-'}</strong></span>
                  <span>휴게 <strong>{rec.break_h}h</strong>

                  </span>
                </div>
                {isPending ? (
                  <div style={{ display: 'flex', gap: 6 }}>
                    <Btn size="sm" onClick={() => approve(rec.id)} style={{ flex: 1 }}>✓ 승인</Btn>
                    <Btn size="sm" variant="danger" onClick={() => removeRec(rec.id)}>삭제</Btn>
                  </div>
                ) : (
                  <div style={{ textAlign: 'right' }}>
                    <button onClick={() => removeRec(rec.id)} style={{
                      background: 'transparent', border: 'none', color: C.t3,
                      fontSize: 10, cursor: 'pointer', textDecoration: 'underline', fontFamily: 'inherit'
                    }}>기록 삭제</button>

          })
